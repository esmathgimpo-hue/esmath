/* 학생이 특정 기간(startDate~endDate)에 본 전범위 시험 목록
   - lesson(testIsFullRange)만 기준으로 추출
   - attempt(1차/2차/...)는 같은 교재 내에서 시간순으로 자체 계산
   - 교재명은 textbookTests에서 같은 날짜+점수로 매칭 */
function getFullRangeTestsInWeek(sid, startDate, endDate){
  if(!startDate || !endDate) return [];
  const studTests = textbookTests[sid] || {};
  const books = cfg.textbooks || [];
  const stud = (cfg.students||[]).find(x=>x.id===sid);

  // 교재명 추출 헬퍼
  const resolveBookName=(date, score)=>{
    let name = '전범위 시험';
    Object.entries(studTests).forEach(([tbId, attempts])=>{
      attempts.forEach(att=>{
        if(att.date === date && parseFloat(att.score)===score){
          const bk = books.find(b=>b.id===tbId);
          const studTb = (stud?.textbooks||[]).find(t=>t.tbId===tbId || ('p_'+sid+'_'+encodeURIComponent(t.name||''))===tbId);
          name = bk?.name || studTb?.name || name;
        }
      });
    });
    return name;
  };

  // 1) 학생의 모든 전범위 시험 lesson을 시간순으로
  const allFullRangeLessons = Object.values(mdb.lessons||{})
    .filter(l=> l.studentId===sid && l.testIsFullRange && l.testScore && String(l.testScore).trim()!=='' && !isNaN(parseFloat(l.testScore)))
    .sort((a,b)=> a.date.localeCompare(b.date));

  // 2) 각 lesson에 교재명 + 교재별 시간순 attempt 번호
  const lessonsWithName = allFullRangeLessons.map(l=>{
    const score = parseFloat(l.testScore);
    return { lesson:l, score, bookName: resolveBookName(l.date, score) };
  });
  const bookCounter = {};
  lessonsWithName.forEach(item=>{
    bookCounter[item.bookName] = (bookCounter[item.bookName]||0) + 1;
    item.attempt = bookCounter[item.bookName];
  });

  // 3) 해당 기간 안의 lesson만 결과로
  const result = [];
  lessonsWithName.forEach(item=>{
    if(item.lesson.date < startDate || item.lesson.date > endDate) return;
    result.push({
      textbookName: item.bookName,
      attempt: item.attempt,
      score: item.score,
      passed: item.score >= 80,
      date: item.lesson.date,
    });
  });
  return result;
}

/* ── WEEKLY RENDER ── */
function rWeekly(){
  const studs=cfg.students||[];
  if(!studs.length) return `<div class="empty">학생이 없습니다.</div>`;

  const filterMode=st.weeklyFilter||'all'; // 'all' | 'care'
  const filterClass=st.weeklyClass||'all';
  const isPrin=session?.role==='principal';
  const filterTeacher=isPrin?(st.weeklyTeacher||''):'';
  const todayStr=dk(new Date());

  // 학생별 회차 기준 주차 계산 (항상 4주차로 분할)
  // - 주3회반 (월수금/화목금): 1달=12회, 1주차=3회
  // - 주2회반 (월수/화목): 1달=8회, 1주차=2회
  function getStudentWeeks(s){
    const ct=CT()[s.classType];
    if(!ct) return [];
    const sessions=sessionsForMonthWithCycle(s.classType,st.year,st.month);
    if(!sessions.length) return [];
    const perWeek = Math.max(1, Math.round(sessions.length / 4));
    const weeks=[];
    for(let i=0; i<sessions.length; i+=perWeek){
      const chunk=sessions.slice(i, i+perWeek);
      if(!chunk.length) break;
      weeks.push({
        weekNo: weeks.length+1,
        sessions: chunk,
        dates: chunk.map(x=>x.dateStr),
      });
      if(weeks.length>=4) break;
    }
    // 각 주차의 시간 범위(rangeStart~rangeEnd) 계산
    // - rangeStart: 첫 회차 날짜
    // - rangeEnd: 다음 주차 첫 회차 직전 (마지막 주차는 마지막 회차 + 7일)
    weeks.forEach((w, idx)=>{
      w.rangeStart = w.dates[0];
      if(idx < weeks.length-1){
        // 다음 주차 첫 회차 - 1일
        const nextStart = weeks[idx+1].dates[0];
        const dt = parseDate(nextStart);
        dt.setDate(dt.getDate()-1);
        w.rangeEnd = dk(dt);
      } else {
        // 마지막 주차: 마지막 회차 + 7일
        const dt = parseDate(w.dates[w.dates.length-1]);
        dt.setDate(dt.getDate()+7);
        w.rangeEnd = dk(dt);
      }
    });
    return weeks;
  }

  // 각 주차의 통계 계산 — 정규 회차(week.dates)만 사용 (토요보강 제외)
  function calcWeekStats(sid, week, classType){
    const dates=[...week.dates]; // 정규 회차만
    let attend=0,absent=0,late=0;
    let hwScores=[], testScores=[];
    dates.forEach(d=>{
      const l=mdb.lessons[lk(sid,d)];
      if(!l) return;
      if(l.attendance==='attend') attend++;
      else if(l.attendance==='absent') absent++;
      else if(l.attendance==='late') late++;
      const hs=parseFloat(l.homeworkScore);
      if(!isNaN(hs)) hwScores.push(hs);
      // 전범위 시험은 평균에서 제외
      if(!l.testIsFullRange){
        const ts=parseFloat(l.testScore);
        if(!isNaN(ts)) testScores.push(ts);
      }
    });
    const hwAvg=hwScores.length?Math.round(hwScores.reduce((a,b)=>a+b,0)/hwScores.length):null;
    const testAvg=testScores.length?Math.round(testScores.reduce((a,b)=>a+b,0)/testScores.length):null;
    return {attend,absent,late,hwAvg,testAvg,total:dates.length,allDates:dates};
  }

  // 관리 필요 학생 카운트
  const careStudents=new Set();
  studs.forEach(s=>{
    if(filterTeacher && !isStudentOfTeacher(s,filterTeacher)) return;
    // 선생님이고 viewAll 꺼져있으면 본인 담당 학생만 (평일/금요일 어느 하나라도 담당이면 표시)
    if(!isPrin && !st.viewAll && !isStudentOfTeacher(s, session?.username)) return;
    const weeks=getStudentWeeks(s);
    weeks.forEach(w=>{
      const stats=calcWeekStats(s.id, w, s.classType);
      const wKey=`${st.year}-${String(st.month).padStart(2,'0')}-w${w.weekNo}`;
      const ev=getWkEval(s.id,wKey);
      if(getAlerts(stats,ev).length>0) careStudents.add(s.id);
    });
  });

  let h=`<div class="toolbar">
    <div class="tleft" style="flex-wrap:wrap">
      <div class="wk-filter-tabs">
        <button class="wk-ftab${filterMode==='all'?' active':''}" onclick="setWkFilter('all')">전체 학생</button>
        <button class="wk-ftab${filterMode==='care'?' active':''}" onclick="setWkFilter('care')">🚨 관리 필요 (${careStudents.size}명)</button>
      </div>
      <select onchange="setWkClass(this.value)">
        <option value="all" ${filterClass==='all'?'selected':''}>전체 반</option>
        ${Object.entries(CT()).map(([k,v])=>`<option value="${k}" ${filterClass===k?'selected':''}>${v.label}</option>`).join('')}
      </select>
      ${isPrin?`<select onchange="setWkTeacher(this.value)" title="선생님별 필터">
        <option value="" ${!filterTeacher?'selected':''}>👩‍🏫 전체 선생님</option>
        ${allTeachers().map(t=>`<option value="${esc(t)}" ${filterTeacher===t?'selected':''}>${esc(t)}</option>`).join('')}
      </select>`:''}
    </div>
    <button class="btn btn-green" onclick="exportWeeklyExcel()">📥 주간요약 엑셀</button>
  </div>
  <div class="notice" style="margin-top:8px">📌 주차는 <b>학생 본인의 회차 기준</b>입니다 · 주2회반(월수/화목)은 한 주에 2회 · 주3회반(월수금/화목금)은 한 주에 3회 · <b>총 4주차</b>로 구분되며 매 주차마다 응용력·집중도·과제충실도를 평가합니다</div>`;

  // 관리 필요 배너
  if(careStudents.size>0){
    const careNames=[...careStudents].map(id=>(studs.find(s=>s.id===id)||{}).name).filter(Boolean);
    h+=`<div class="care-header">🚨 관리 필요 학생 ${careStudents.size}명: ${careNames.join(', ')}</div>`;
  }

  // 4주차 각각을 섹션으로 표시
  for(let weekNo=1; weekNo<=4; weekNo++){
    // 이 주차에 해당하는 학생들 (모두 12회차/8회차로 분할되어 있음)
    let weekStuds=studs.filter(s=>{
      if(filterClass!=='all' && s.classType!==filterClass) return false;
      if(filterMode==='care' && !careStudents.has(s.id)) return false;
      if(filterTeacher && !isStudentOfTeacher(s,filterTeacher)) return false;
      // 선생님이고 viewAll 꺼져있으면 본인 담당 학생만
      if(!isPrin && !st.viewAll && !isStudentOfTeacher(s, session?.username)) return false;
      const weeks=getStudentWeeks(s);
      return weeks.length>=weekNo;
    });
    if(!weekStuds.length) continue;

    // 이번 주에 해당하는 학생이 있는지
    const isCurrentWeek=weekStuds.some(s=>{
      const weeks=getStudentWeeks(s);
      const w=weeks[weekNo-1];
      if(!w) return false;
      return w.dates.some(d=>d===todayStr);
    });

    h+=`<div class="wk-section">
      <div class="wk-title">
        ${weekNo}주차
        ${isCurrentWeek?'<span class="badge" style="background:#fff5cc;color:#7a4e00;font-size:11px">진행 중</span>':''}
        <span style="font-size:11px;color:var(--text3)">${weekStuds.length}명</span>
      </div>
      <div class="wk-grid">`;

    weekStuds.forEach(s=>{
      const weeks=getStudentWeeks(s);
      const w=weeks[weekNo-1];
      if(!w) return;
      const stats=calcWeekStats(s.id, w, s.classType);
      const wKey=`${st.year}-${String(st.month).padStart(2,'0')}-w${weekNo}`;
      const ev=getWkEval(s.id, wKey);
      const alerts=getAlerts(stats, ev);
      const needsCare=alerts.length>0;

      // 회차별 출결 pill
      const datePills=w.sessions.map(sess=>{
        const d=sess.dateStr;
        const l=mdb.lessons[lk(s.id,d)]||{};
        const att=l.attendance||'';
        const cls=att==='attend'?'pill-a':att==='late'?'pill-l':att==='absent'?'pill-x':'pill-n';
        const label=att==='attend'?'출':att==='late'?'지':att==='absent'?'결':'?';
        return `<span class="att-pill ${cls}" title="${d}">${sess.sessionNo}회 ${label}</span>`;
      }).join('');

      h+=`<div class="wk-card${needsCare?' needs-care':''}">
        <div class="wk-card-hdr">
          <b style="font-size:13px">${s.name}</b>
          ${s.grade?gradeBadge(s.grade):''}
          <div class="att-pills" style="flex-wrap:wrap;gap:3px">${datePills}</div>
        </div>
        <div class="wk-card-body">`;

      // Alert badges
      if(alerts.length){
        h+=`<div class="alert-row">`;
        alerts.forEach(a=>{ h+=`<span class="alert-badge alert-${a.type}">${a.icon} ${a.text}</span>`; });
        h+=`</div>`;
      } else {
        h+=`<div class="alert-row"><span class="alert-badge alert-green">✅ 이상 없음</span></div>`;
      }

      // 출결 + 점수 평균 라인
      h+=`<div style="display:flex;gap:14px;flex-wrap:wrap;font-size:11px;color:var(--text2);margin-bottom:10px;padding:6px 8px;background:var(--bg2);border-radius:6px">
        <span>출 <b style="color:var(--green)">${stats.attend}</b></span>
        <span>지 <b style="color:var(--amber)">${stats.late}</b></span>
        <span>결 <b style="color:var(--red)">${stats.absent}</b></span>
        <span style="margin-left:auto">📝 과제평균 <b style="color:${stats.hwAvg!==null && stats.hwAvg<=60?'var(--red)':'var(--text)'}">${stats.hwAvg!==null?stats.hwAvg+'점':'-'}</b></span>
        <span>📊 시험평균 <b>${stats.testAvg!==null?stats.testAvg+'점':'-'}</b></span>
      </div>`;

      // 그 주차에 본 전범위 시험 표시
      const fullRangeTests = getFullRangeTestsInWeek(s.id, w.rangeStart||stats.allDates[0], w.rangeEnd||stats.allDates[stats.allDates.length-1]);
      if(fullRangeTests.length){
        fullRangeTests.forEach(t=>{
          const ordLabel = t.attempt===1 ? '시험' : `${t.attempt}차시험`;
          const passLabel = t.passed
            ? `<span style="color:#3a6818;font-weight:700">합격</span>`
            : `<span style="color:#a02828;font-weight:700">불합격</span>`;
          h+=`<div style="font-size:12px;padding:7px 10px;background:#fff8e8;border:1px solid #f0d090;border-radius:6px;margin-bottom:6px">
            📚 <b>${esc(t.textbookName)}</b> 전범위 서술형 ${ordLabel} 결과: <b style="color:${t.passed?'#3a6818':'#a02828'}">${t.score}점</b> ${passLabel}
          </div>`;
        });
      }

      // 평가 행
      h+=`<div class="eval-row"><span class="eval-lbl">응용력</span>${starsHtml(s.id,wKey,'app',ev.app)}</div>`;
      h+=`<div class="eval-row"><span class="eval-lbl">집중도</span>${starsHtml(s.id,wKey,'focus',ev.focus)}</div>`;
      h+=`<div class="eval-row"><span class="eval-lbl">과제충실도</span>${starsHtml(s.id,wKey,'hw',ev.hw)}</div>`;

      // Memo
      h+=`<div style="margin-top:6px">
        <textarea class="wk-memo" placeholder="주간 메모 (선생님 코멘트)" onblur="wkSetMemo('${s.id}','${wKey}',this.value)">${esc(ev.memo||'')}</textarea>
      </div>`;

      h+=`</div></div>`;
    });

    h+=`</div></div>`;
  }

  return h;
}

/* ── MONTHLY SUMMARY TAB ── */
function rMonthly(){
  const studs = cfg.students||[];
  if(!studs.length) return `<div class="empty">학생이 없습니다.</div>`;

  const isPrin = session?.role==='principal';
  const filterClass = st.monthlyClass||'all';

  let filtered = studs.filter(s=>{
    if(filterClass!=='all' && s.classType!==filterClass) return false;
    if(!isPrin && !st.viewAll && !isStudentOfTeacher(s, session?.username)) return false;
    return true;
  });

  // 월 전체 출결 통계
  function calcMonthStats(sid, classType){
    const sessions = sessionsForMonthWithCycle(classType, st.year, st.month);
    let attend=0, absent=0, late=0, testScores=[];
    sessions.forEach(sess=>{
      const l = mdb.lessons[lk(sid, sess.dateStr)];
      if(!l) return;
      if(l.attendance==='attend') attend++;
      else if(l.attendance==='absent') absent++;
      else if(l.attendance==='late') late++;
      if(!l.testIsFullRange){ const ts=parseFloat(l.testScore); if(!isNaN(ts)) testScores.push(ts); }
    });
    const testAvg = testScores.length ? Math.round(testScores.reduce((a,b)=>a+b,0)/testScores.length) : null;
    return { attend, absent, late, testAvg, totalSessions: sessions.length };
  }

  // 전범위 1차 90점 이상 여부
  function hasMasterScore(sid){
    const myTests = textbookTests[sid]||{};
    return Object.values(myTests).some(arr=>{
      const first = arr.find(a=>Number(a.attempt)===1);
      if(!first || first.manualComplete) return false;

// 포인트 계산 상수
const PT = {
  PERFECT: 5000,
  STEADY:  2000,
  DAILY:   2000,
  MASTER_HIGH: 5000,
  MASTER_LOW:  2000,
};

// 학생의 특정 월 포인트 자동 계산 (미적립 상태 미리보기용)
function calcMonthPoints(sid, classType, year, month){
  const sessions = sessionsForMonthWithCycle(classType, year, month);
  const earned = [];

  // ── 출결 보상 ──
  // 반의 표준 회차 (주2회=8, 주3회=12) 기준으로 판단
  const ct = CT()[classType];
  const stdSessions = ct ? (ct.sessions || sessions.length) : sessions.length;
  let absent=0, late=0, attend=0;
  sessions.forEach(sess=>{
    const l = mdb.lessons[lk(sid, sess.dateStr)];
    if(!l) return;
    if(l.attendance==='absent') absent++;
    else if(l.attendance==='late') late++;
    else if(l.attendance==='attend') attend++;
  });
  // 전체 출석 기록 수 (미기록 제외)
  const recorded = absent + late + attend;
  // 표준 회차를 모두 채운 경우에만 판단
  // (기록된 수가 표준 회차 미만이면 아직 달이 안 끝난 것으로 간주 — 미리보기용)
  if(sessions.length > 0){
    if(absent===0 && late===0 && attend>0){
      earned.push({type:'PERFECT', label:'PERFECT 출석상', points:PT.PERFECT,
        note:`결석 0 · 지각 0 (${stdSessions}회 기준)`});
    } else if(absent===0 && late>=1 && late<=2){
      earned.push({type:'STEADY', label:'STEADY 출석상', points:PT.STEADY,
        note:`결석 0 · 지각 ${late}회 (${stdSessions}회 기준)`});
    }
  }

  // ── DAILY 챌린지상 (전범위 제외 시험 평균 80점↑) ──
  const testScores=[];
  sessions.forEach(sess=>{
    const l = mdb.lessons[lk(sid, sess.dateStr)];
    if(!l || l.attendance==='absent' || l.testIsFullRange) return;
    const ts = parseFloat(l.testScore);
    if(!isNaN(ts)) testScores.push(ts);
  });
  if(testScores.length>0){
    const avg = Math.round(testScores.reduce((a,b)=>a+b,0)/testScores.length);
    if(avg>=80){
      earned.push({type:'DAILY', label:'DAILY 챌린지상', points:PT.DAILY, note:`시험 평균 ${avg}점`});
    }
  }

  // ── MASTER 인증상 (전범위 1차 90점↑) ──
  const myTests = textbookTests[sid]||{};
  Object.entries(myTests).forEach(([tbId, arr])=>{
    const first = arr.find(a=>Number(a.attempt)===1);
    if(!first || first.manualComplete) return;
    const sc = parseFloat(first.score);
    if(isNaN(sc) || sc < 90) return;
    // 시험 날짜가 해당 월인지 확인
    const testDate = first.date||'';
    if(testDate){
      const ty=parseInt(testDate.slice(0,4)), tm=parseInt(testDate.slice(5,7));
      if(ty!==year || tm!==month) return;
    }
    const bk=(cfg.textbooks||[]).find(b=>b.id===tbId);
    const tier = (bk?.masterTier||'high')==='high' ? 'high' : 'low';
    const pts  = tier==='high' ? PT.MASTER_HIGH : PT.MASTER_LOW;
    earned.push({
      type: tier==='high'?'MASTER_HIGH':'MASTER_LOW',
      label: `MASTER 인증상 (${tier==='high'?'HIGH':'LOW'})`,
      points: pts,
      note: `${bk?.name||'교재'} 1차 ${sc}점`,
    });
  });

  return earned;
}

async function confAddManualPoint(){
  const sid   = document.getElementById('ptSid').value;
  const label = document.getElementById('ptLabel').value.trim();

  const note  = document.getElementById('ptNote').value.trim();

  const pd = pointsData[sid]||{balance:0,history:[],settled:[]};
  pd.balance = (pd.balance||0) + pts;
  pd.history = [...(pd.history||[]), {
    id:'h'+Date.now()+Math.random(),

    label,
    points: pts,
    note,
    year: st.year, month: st.month,

    by: session?.username||'',
  }];

  toast(`포인트 ${pts>0?'+':''}${pts.toLocaleString()}P 처리됐습니다`);
  closeM(); render();
}

// 포인트 차감 (사용 처리)
async function confUsePoint(){
  const sid   = document.getElementById('ptUseSid').value;
  const pts   = parseInt(document.getElementById('ptUseAmount').value);
  const note  = document.getElementById('ptUseNote').value.trim();
  if(!sid){alert('학생을 선택해주세요');return;}
  if(isNaN(pts)||pts<=0){alert('차감할 포인트를 입력해주세요');return;}
  const pd = pointsData[sid]||{balance:0,history:[],settled:[]};
  if((pd.balance||0) < pts){
    if(!confirm(`잔액(${(pd.balance||0).toLocaleString()}P)보다 차감액이 큽니다. 계속할까요?`)) return;
  }
  pd.balance = (pd.balance||0) - pts;
  pd.history = [...(pd.history||[]), {
    id:'h'+Date.now()+Math.random(),
    type:'USE',
    label:'포인트 사용',
    points: -pts,
    note: note||'수강료 차감',
    year: st.year, month: st.month,
    date: dk(new Date()),
    by: session?.username||'',
  }];
  await savePointsData(sid, pd);
  toast(`${pts.toLocaleString()}P 차감 처리됐습니다`);
  closeM(); render();
}

// 포인트 내역 삭제
async function delPointHistory(sid, hid){
  if(!confirm('이 포인트 내역을 삭제하시겠어요?')) return;
  const pd = pointsData[sid];
  if(!pd) return;
  const target = pd.history.find(h=>h.id===hid);
  if(!target) return;
  pd.history = pd.history.filter(h=>h.id!==hid);
  pd.balance = (pd.balance||0) - target.points; // 역산
  await savePointsData(sid, pd);
  toast('삭제됐습니다'); render();
}

  <!-- 탭 전환 -->
  <div style="display:flex;gap:4px;margin-bottom:16px;border-bottom:2px solid var(--border);padding-bottom:0">
    <button onclick="st.ptTab='attend';render()" style="padding:8px 16px;font-size:13px;border:none;background:transparent;cursor:pointer;font-family:inherit;font-weight:${ptTab==='attend'?'700':'400'};color:${ptTab==='attend'?'var(--text)':'var(--text2)'};border-bottom:${ptTab==='attend'?'2px solid var(--text)':'2px solid transparent'};margin-bottom:-2px">
      🏅 출결 포인트 정산
    </button>
    <button onclick="st.ptTab='other';render()" style="padding:8px 16px;font-size:13px;border:none;background:transparent;cursor:pointer;font-family:inherit;font-weight:${ptTab==='other'?'700':'400'};color:${ptTab==='other'?'var(--text)':'var(--text2)'};border-bottom:${ptTab==='other'?'2px solid var(--text)':'2px solid transparent'};margin-bottom:-2px">
      📊 기타 포인트 정산
    </button>
    <button onclick="st.ptTab='balance';render()" style="padding:8px 16px;font-size:13px;border:none;background:transparent;cursor:pointer;font-family:inherit;font-weight:${ptTab==='balance'?'700':'400'};color:${ptTab==='balance'?'var(--text)':'var(--text2)'};border-bottom:${ptTab==='balance'?'2px solid var(--text)':'2px solid transparent'};margin-bottom:-2px">
      💳 잔액 현황
    </button>
  </div>`;

  // ══════════════════════════════════════
  // 탭 1: 출결 포인트 수동 정산
  // ══════════════════════════════════════
  if(ptTab==='attend'){
    // 정산 기준월 선택
    h += `<div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap">
      <span style="font-size:13px;font-weight:600">정산 기준월</span>
      <select style="font-size:13px;padding:5px 10px" onchange="
        const [y,m]=this.value.split('-').map(Number);
        st.ptSettleYear=y; st.ptSettleMonth=m; render()
      ">
        ${monthOpts.map(o=>`<option value="${o.year}-${o.month}" ${o.year===settleYear&&o.month===settleMonth?'selected':''}>${o.label}</option>`).join('')}
      </select>
      <span style="font-size:12px;color:var(--text3)">어나더클래스에서 출결 확인 후 아래에서 각 학생 선택</span>
    </div>`;

    // 미정산 / 정산완료 구분
    const unsetList  = filtered.filter(s=>!isAttendSettled(s.id,settleYear,settleMonth));
    const doneList   = filtered.filter(s=>isAttendSettled(s.id,settleYear,settleMonth));

    if(unsetList.length){
      h += `<div style="font-size:12px;font-weight:700;color:var(--text2);margin-bottom:8px">
        미정산 (${unsetList.length}명) — 시스템 출결은 참고용 · 어나더클래스 확인 후 최종 선택
      </div>
      <div style="border:1px solid var(--border);border-radius:var(--rl);overflow:hidden;margin-bottom:16px">`;

      unsetList.forEach((s,i)=>{
        const ct  = CT()[s.classType];
        const sel = (st.ptAttendSel||{})[s.id]||'none';
        const selPt = sel==='perfect'?PT.PERFECT:sel==='steady'?PT.STEADY:0;

        // 시스템 출결 기록 계산 (참고용)
        const sessions = sessionsForMonthWithCycle(s.classType, settleYear, settleMonth);
        let absCount=0, lateCount=0, attendCount=0;
        sessions.forEach(sess=>{
          const l = mdb.lessons[lk(s.id, sess.dateStr)];
          if(!l) return;
          if(l.attendance==='absent') absCount++;
          else if(l.attendance==='late') lateCount++;
          else if(l.attendance==='attend') attendCount++;
        });
        const totalRec = absCount+lateCount+attendCount;

        // 시스템 기준 추천 등급
        let sysRecommend = 'none';
        if(totalRec>0){
          if(absCount===0 && lateCount===0 && attendCount>0) sysRecommend='perfect';
          else if(absCount===0 && lateCount>=1 && lateCount<=2) sysRecommend='steady';
        }
        const recBadge = sysRecommend==='perfect'
          ? `<span style="font-size:10px;padding:1px 7px;border-radius:20px;background:#e2f2e9;color:#1e6e3a;border:1px solid #80c090;font-weight:600">시스템 PERFECT</span>`
          : sysRecommend==='steady'
          ? `<span style="font-size:10px;padding:1px 7px;border-radius:20px;background:#e5effc;color:#1558a8;border:1px solid #90b8e8;font-weight:600">시스템 STEADY</span>`
          : totalRec>0
          ? `<span style="font-size:10px;padding:1px 7px;border-radius:20px;background:#fce6e6;color:#a02828;border:1px solid #e0a0a0;font-weight:600">결석 ${absCount}회</span>`
          : `<span style="font-size:10px;color:var(--text3)">기록 없음</span>`;

        h += `<div data-pt-name="${esc(s.name)}" style="border-bottom:1px solid var(--border);background:${i%2===0?'#fff':'#fafaf9'}">
          <div style="display:flex;align-items:center;gap:10px;padding:10px 14px;flex-wrap:wrap">
            <div style="display:flex;align-items:center;gap:6px;flex:1;min-width:150px;flex-wrap:wrap">
              <b style="font-size:13px">${esc(s.name)}</b>
              ${s.grade?gradeBadge(s.grade):''}
              ${ct?`<span class="badge ${ct.badge||'b-mwf'}" style="font-size:10px">${ct.label}</span>`:''}
            </div>
            <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
              <span style="font-size:11px;color:var(--text2);background:var(--bg2);padding:2px 8px;border-radius:6px">
                출 <b>${attendCount}</b> 지 <b style="color:${lateCount>0?'var(--amber)':'var(--text)'}">${lateCount}</b> 결 <b style="color:${absCount>0?'var(--red)':'var(--text)'}">${absCount}</b>
              </span>
              ${recBadge}
            </div>
          </div>
          <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;padding:0 14px 10px">
            <span style="font-size:11px;color:var(--text3);margin-right:4px">어나더클래스 확인 후 선택 →</span>
            <button onclick="setPtAttendSel('${s.id}','none')"
              style="padding:5px 12px;font-size:12px;border-radius:20px;cursor:pointer;font-family:inherit;font-weight:600;
              background:${sel==='none'?'#1a1a1a':'transparent'};color:${sel==='none'?'#fff':'var(--text2)'};
              border:1px solid ${sel==='none'?'#1a1a1a':'var(--border2)'}">
              없음
            </button>
            <button onclick="setPtAttendSel('${s.id}','perfect')"
              style="padding:5px 12px;font-size:12px;border-radius:20px;cursor:pointer;font-family:inherit;font-weight:600;
              background:${sel==='perfect'?'#1e6e3a':'transparent'};color:${sel==='perfect'?'#fff':'#1e6e3a'};
              border:1px solid ${sel==='perfect'?'#1e6e3a':'#80c090'}">
              🏅 PERFECT +${PT.PERFECT.toLocaleString()}P
            </button>
            <button onclick="setPtAttendSel('${s.id}','steady')"
              style="padding:5px 12px;font-size:12px;border-radius:20px;cursor:pointer;font-family:inherit;font-weight:600;
              background:${sel==='steady'?'#1558a8':'transparent'};color:${sel==='steady'?'#fff':'#1558a8'};
              border:1px solid ${sel==='steady'?'#1558a8':'#90b8e8'}">
              ⭐ STEADY +${PT.STEADY.toLocaleString()}P
            </button>
            ${selPt>0?`<span style="font-size:12px;font-weight:700;color:#1e6e3a;margin-left:4px">+${selPt.toLocaleString()}P 선택됨</span>`:''}
          </div>
        </div>`;
      });
      h += `</div>`;

      // 선택 현황 요약 + 적립 버튼
      const selMap   = st.ptAttendSel||{};
      const perfCnt  = unsetList.filter(s=>selMap[s.id]==='perfect').length;
      const stCnt    = unsetList.filter(s=>selMap[s.id]==='steady').length;
      const totalPt  = perfCnt*PT.PERFECT + stCnt*PT.STEADY;
      const anySelected = perfCnt+stCnt > 0;

      h += `<div style="display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--bg2);border-radius:var(--rl);margin-bottom:8px;flex-wrap:wrap">
        <span style="font-size:12px;color:var(--text2)">
          선택: PERFECT <b>${perfCnt}명</b> · STEADY <b>${stCnt}명</b>
          ${anySelected?` · 총 <b style="color:#1e6e3a">+${totalPt.toLocaleString()}P</b>`:''}
        </span>
        <div style="margin-left:auto;display:flex;gap:6px;flex-wrap:wrap">
          ${isPrin&&anySelected?`<button class="btn btn-primary" onclick="confirmAttendSettle(${settleYear},${settleMonth})">✅ ${settleYl} 출결 포인트 적립</button>`:''}
          ${anySelected?`<button class="btn" onclick="st.ptAttendSel={};render()">초기화</button>`:''}
          ${isPrin&&unsetList.length?`<button class="btn" style="color:var(--text3)" onclick="skipAttendSettle(${settleYear},${settleMonth})">이달 출결 없음으로 완료</button>`:''}
        </div>
      </div>`;
    }

    if(doneList.length){
      h += `<div style="margin-top:10px">
        <div style="font-size:12px;font-weight:700;color:var(--text2);margin-bottom:8px">정산 완료 (${doneList.length}명)</div>
        <div style="border:1px solid var(--border);border-radius:var(--rl);overflow:hidden">`;
      doneList.forEach((s,i)=>{
        const ct = CT()[s.classType];
        const attHistory = (pointsData[s.id]?.history||[])
          .filter(h=>h.year===settleYear&&h.month===settleMonth&&(h.type==='PERFECT'||h.type==='STEADY'))
          .reverse();
        const attPt = attHistory.reduce((a,h)=>a+h.points,0);
        h += `<div data-pt-name="${esc(s.name)}" style="display:flex;align-items:center;gap:8px;padding:9px 14px;border-bottom:1px solid var(--border);background:${i%2===0?'#fff':'#fafaf9'};flex-wrap:wrap">
          <b style="font-size:12px">${esc(s.name)}</b>
          ${s.grade?gradeBadge(s.grade):''}
          ${ct?`<span class="badge ${ct.badge||'b-mwf'}" style="font-size:10px">${ct.label}</span>`:''}
          <span style="margin-left:auto;font-size:12px;color:${attPt>0?'#1e6e3a':'var(--text3)'}">
            ${attHistory.length?attHistory.map(h=>`${h.label} +${h.points.toLocaleString()}P`).join(' · '):'출결 포인트 없음'}
          </span>
          ${isPrin?`<button class="btn btn-sm" style="font-size:10px;color:var(--red)" onclick="resetAttendSettle('${s.id}',${settleYear},${settleMonth})">취소</button>`:''}
        </div>`;
      });
      h += `</div></div>`;
    }
  }

  // ══════════════════════════════════════
  // 탭 2: 기타 포인트 정산 (DAILY/MASTER/성적보상)
  // ══════════════════════════════════════
  else if(ptTab==='other'){
    h += `<div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap">
      <span style="font-size:13px;font-weight:600">정산 기준월</span>
      <select style="font-size:13px;padding:5px 10px" onchange="
        const [y,m]=this.value.split('-').map(Number);
        st.ptSettleYear=y; st.ptSettleMonth=m; render()
      ">
        ${monthOpts.map(o=>`<option value="${o.year}-${o.month}" ${o.year===settleYear&&o.month===settleMonth?'selected':''}>${o.label}</option>`).join('')}
      </select>
    </div>

    <div style="font-size:12px;font-weight:700;color:var(--text2);margin-bottom:8px">DAILY 챌린지상 / MASTER 인증상 — 시스템 자동 계산 결과</div>
    <div style="border:1px solid var(--border);border-radius:var(--rl);overflow:hidden;margin-bottom:16px">`;

    filtered.forEach((s,i)=>{
      const ct = CT()[s.classType];
      const earned = calcMonthPoints(s.id, s.classType, settleYear, settleMonth)
        .filter(e=>e.type==='DAILY'||e.type==='MASTER_HIGH'||e.type==='MASTER_LOW');
      const alreadySettled = (pointsData[s.id]?.history||[])
        .some(h=>h.year===settleYear&&h.month===settleMonth&&(h.type==='DAILY'||h.type==='MASTER_HIGH'||h.type==='MASTER_LOW'));
      if(!earned.length && !alreadySettled) return;

      h += `<div data-pt-name="${esc(s.name)}" style="display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:1px solid var(--border);background:${i%2===0?'#fff':'#fafaf9'};flex-wrap:wrap">
        <div style="flex:1;min-width:120px">
          <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:4px">
            <b style="font-size:13px">${esc(s.name)}</b>
            ${s.grade?gradeBadge(s.grade):''}
            ${ct?`<span class="badge ${ct.badge||'b-mwf'}" style="font-size:10px">${ct.label}</span>`:''}
          </div>
          ${earned.map(e=>`<div style="font-size:11px;color:var(--text2)">• ${esc(e.label)} <b>+${e.points.toLocaleString()}P</b> <span style="color:var(--text3)">${esc(e.note)}</span></div>`).join('')}
          ${alreadySettled?`<div style="font-size:11px;color:#1e6e3a;margin-top:2px">✅ 이미 적립됨</div>`:''}
        </div>
        ${isPrin&&earned.length&&!alreadySettled?`<button class="btn btn-sm btn-primary" onclick="settleOtherPoints('${s.id}',${settleYear},${settleMonth})">+${earned.reduce((a,e)=>a+e.points,0).toLocaleString()}P 적립</button>`:''}
      </div>`;
    });

    const anyOther = filtered.some(s=>{
      const earned=calcMonthPoints(s.id,s.classType,settleYear,settleMonth).filter(e=>e.type==='DAILY'||e.type==='MASTER_HIGH'||e.type==='MASTER_LOW');
      const done=(pointsData[s.id]?.history||[]).some(h=>h.year===settleYear&&h.month===settleMonth&&(h.type==='DAILY'||h.type==='MASTER_HIGH'||h.type==='MASTER_LOW'));
      return earned.length||done;
    });
    if(!anyOther) h += `<div style="padding:20px;text-align:center;color:var(--text3);font-size:12px">해당 월에 DAILY/MASTER 실적이 없습니다</div>`;
    h += `</div>`;

    // 성적 보상 수동 적립 안내
    h += `<div style="font-size:12px;font-weight:700;color:var(--text2);margin-bottom:8px">성적 보상 (수동 적립)</div>
    <div style="padding:12px 14px;border:1px solid var(--border);border-radius:var(--rl);background:var(--bg);margin-bottom:8px">
      <div style="font-size:12px;color:var(--text2);margin-bottom:10px">TOP HONOR, HIGH HONOR, GROWTH 보상은 성적표 인증 후 직접 적립해주세요.</div>
      ${isPrin?`<button class="btn btn-primary btn-sm" onclick="openM('addManualPoint')">✏️ 성적 보상 적립</button>`:''}
    </div>

    <!-- 이달 수상자 현황 요약 -->
    <div style="font-size:12px;font-weight:700;color:var(--text2);margin:16px 0 8px">🏆 ${settleYl} 수상 현황 요약</div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px;margin-bottom:14px">`;

    // 수상 현황 계산
    const awardDefs2 = [
      {id:'perfect', label:'🏅 PERFECT 출석상', color:'#1e6e3a', bg:'#e2f2e9', border:'#80c090'},
      {id:'steady',  label:'⭐ STEADY 출석상',  color:'#1558a8', bg:'#e5effc', border:'#90b8e8'},
      {id:'daily',   label:'📊 DAILY 챌린지상', color:'#7a4e00', bg:'#fdf0d8', border:'#e0c060'},
      {id:'master',  label:'👑 MASTER 인증상',  color:'#5a2080', bg:'#f3e8fc', border:'#c090e0'},
    ];
    const awardCount = {perfect:0, steady:0, daily:0, master:0};
    const awardNames = {perfect:[], steady:[], daily:[], master:[]};

    filtered.forEach(s=>{
      // 출결 포인트 내역에서 수상 확인
      const hist = pointsData[s.id]?.history||[];
      const hasPerf  = hist.some(h=>h.year===settleYear&&h.month===settleMonth&&h.type==='PERFECT');
      const hasSteady= hist.some(h=>h.year===settleYear&&h.month===settleMonth&&h.type==='STEADY');
      const hasDaily = hist.some(h=>h.year===settleYear&&h.month===settleMonth&&h.type==='DAILY');
      const hasMaster= hist.some(h=>h.year===settleYear&&h.month===settleMonth&&(h.type==='MASTER_HIGH'||h.type==='MASTER_LOW'));
      if(hasPerf)  { awardCount.perfect++; awardNames.perfect.push(s.name); }
      if(hasSteady){ awardCount.steady++;  awardNames.steady.push(s.name);  }
      if(hasDaily) { awardCount.daily++;   awardNames.daily.push(s.name);   }
      if(hasMaster){ awardCount.master++;  awardNames.master.push(s.name);  }
    });

    awardDefs2.forEach(def=>{
      const cnt   = awardCount[def.id];
      const names = awardNames[def.id];
      h += `<div style="padding:10px 12px;border-radius:var(--rl);border:1px solid ${def.border};background:${def.bg}">
        <div style="font-size:12px;font-weight:700;color:${def.color};margin-bottom:4px">${def.label}</div>
        <div style="font-size:20px;font-weight:800;color:${def.color};margin-bottom:4px">${cnt}명</div>
        ${names.length?`<div style="font-size:10px;color:${def.color};opacity:.8">${names.map(n=>esc(n)).join(', ')}</div>`:'<div style="font-size:10px;color:var(--text3)">해당 없음</div>'}
      </div>`;
    });
    h += `</div>`;
  }

  // ══════════════════════════════════════
  // 탭 3: 잔액 현황
  // ══════════════════════════════════════
  else if(ptTab==='balance'){
    const sorted = [...filtered].sort((a,b)=>(pointsData[b.id]?.balance||0)-(pointsData[a.id]?.balance||0));

    h += `<div style="border:1px solid var(--border);border-radius:var(--rl);overflow:hidden;background:var(--bg);margin-bottom:20px">`;
    sorted.forEach((s,i)=>{
      const pd  = pointsData[s.id]||{balance:0,history:[]};
      const bal = pd.balance||0;
      const ct  = CT()[s.classType];
      const yearEarned = (pd.history||[]).filter(h=>h.year===st.year&&h.points>0).reduce((a,h)=>a+h.points,0);
      const isHonor = yearEarned>=100000;
      const isExpanded = st.ptExpanded===s.id;

      h += `<div data-pt-name="${esc(s.name)}" style="border-bottom:1px solid var(--border);background:${i%2===0?'#fff':'#fafaf9'}">
        <div style="display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;flex-wrap:wrap"
          onclick="st.ptExpanded=(st.ptExpanded==='${s.id}'?null:'${s.id}');render()">
          <div style="display:flex;align-items:center;gap:6px;flex:1;min-width:120px;flex-wrap:wrap">
            <b style="font-size:13px">${esc(s.name)}</b>
            ${s.grade?gradeBadge(s.grade):''}
            ${ct?`<span class="badge ${ct.badge||'b-mwf'}" style="font-size:10px">${ct.label}</span>`:''}
            ${isHonor?`<span style="font-size:10px;padding:1px 7px;border-radius:20px;background:#f3e8fc;color:#5a2080;border:1px solid #c090e0;font-weight:700">👑</span>`:''}
          </div>
          <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
            <span style="font-size:11px;color:var(--text3)">${st.year}년 누적 ${yearEarned.toLocaleString()}P</span>
            <span style="font-size:17px;font-weight:800;color:${bal>0?'#1e6e3a':bal<0?'var(--red)':'var(--text3)'}">${bal.toLocaleString()}P</span>
            <span style="font-size:11px;color:var(--text3)">${isExpanded?'▲':'▼'}</span>
          </div>
        </div>`;

      if(isExpanded){
        const history = [...(pd.history||[])].reverse();
        h += `<div style="padding:0 14px 12px;border-top:1px solid var(--border)">
          <div style="display:flex;gap:6px;margin:10px 0 8px;flex-wrap:wrap">
            ${isPrin?`<button class="btn btn-sm btn-primary" onclick="event.stopPropagation();openM('addManualPoint','${s.id}')">✏️ 적립</button>`:''}
            ${isPrin?`<button class="btn btn-sm" onclick="event.stopPropagation();openM('usePoint','${s.id}')">💳 차감</button>`:''}
          </div>
          <div style="font-size:11px;color:var(--text2);margin-bottom:6px;font-weight:600">전체 내역 (${history.length}건)</div>`;

        if(!history.length){
          h += `<div style="padding:14px;text-align:center;color:var(--text3);font-size:12px">포인트 내역이 없습니다</div>`;
        } else {
          history.forEach(item=>{
            const isPlus=item.points>0;
            h += `<div style="display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:6px;margin-bottom:3px;background:var(--bg2);flex-wrap:wrap">
              <div style="flex:1;min-width:120px">
                <span style="font-size:12px;font-weight:600">${esc(item.label)}</span>
                ${item.note?`<span style="font-size:10px;color:var(--text3);margin-left:4px">${esc(item.note)}</span>`:''}
              </div>
              <span style="font-size:10px;color:var(--text3)">${esc(item.date||'')} · ${esc(item.by||'')}</span>
              <span style="font-size:14px;font-weight:700;color:${isPlus?'#1e6e3a':'var(--red)'}">${isPlus?'+':''}${item.points.toLocaleString()}P</span>
              ${isPrin?`<button class="btn btn-sm" style="color:var(--red);padding:2px 6px;font-size:10px"
                onclick="event.stopPropagation();delPointHistory('${s.id}','${item.id}')">✕</button>`:''}
            </div>`;
          });
        }
        h += `</div>`;
      }
      h += `</div>`;
    });
    h += `</div>`;
  }

  return h;
}

// 출결 포인트 정산 실행
async function confirmAttendSettle(year, month){
  const selMap = st.ptAttendSel||{};
  const studs  = cfg.students||[];
  const targets = studs.filter(s=>selMap[s.id]==='perfect'||selMap[s.id]==='steady');
  if(!targets.length){ toast('선택된 학생이 없습니다',true); return; }

  const yl = `${year}년 ${month}월`;
  const lines = targets.map(s=>`${s.name}: ${selMap[s.id]==='perfect'?'PERFECT +'+PT.PERFECT.toLocaleString()+'P':'STEADY +'+PT.STEADY.toLocaleString()+'P'}`);
  if(!confirm(`${yl} 출결 포인트를 적립합니다.\n\n${lines.join('\n')}\n\n계속하시겠어요?`)) return;

  setSyncState('syncing','출결 포인트 적립 중...');
  const settleKey = `attend_${year}-${String(month).padStart(2,'0')}`;

  for(const s of targets){
    const grade = selMap[s.id];
    const pts   = grade==='perfect' ? PT.PERFECT : PT.STEADY;
    const label = grade==='perfect' ? 'PERFECT 출석상' : 'STEADY 출석상';
    const type  = grade==='perfect' ? 'PERFECT' : 'STEADY';
    const pd = pointsData[s.id]||{balance:0,history:[],attendSettled:[]};
    pd.balance = (pd.balance||0) + pts;
    pd.history = [...(pd.history||[]), {
      id:'h'+Date.now()+Math.random(),
      type, label, points:pts,
      note:`어나더클래스 출결 인증 · ${yl}`,
      year, month,
      date:dk(new Date()),
      by:session?.username||'',
    }];
    pd.attendSettled = [...(pd.attendSettled||[]), settleKey];
    await savePointsData(s.id, pd);
  }

  // 선택 안 된 학생도 "정산완료" 마킹 (없음 선택)
  const allFiltered = (cfg.students||[]).filter(s=>!isAttendSettled(s.id,year,month));
  for(const s of allFiltered){
    if(selMap[s.id]==='perfect'||selMap[s.id]==='steady') continue;
    const pd = pointsData[s.id]||{balance:0,history:[],attendSettled:[]};
    pd.attendSettled = [...(pd.attendSettled||[]), settleKey];
    await savePointsData(s.id, pd);
  }

  st.ptAttendSel={};
  setSyncState('ok','완료');
  toast(`${yl} 출결 포인트 적립 완료 (${targets.length}명)`);
  render();
}

  if(!confirm(`${year}년 ${month}월 출결 포인트를 '없음'으로 정산 완료 처리합니다.\n계속하시겠어요?`)) return;
  const settleKey = `attend_${year}-${String(month).padStart(2,'0')}`;

// 기타 포인트 (DAILY/MASTER) 개별 적립
async function settleOtherPoints(sid, year, month){
  const s = (cfg.students||[]).find(x=>x.id===sid);
  if(!s) return;
  const earned = calcMonthPoints(sid, s.classType, year, month)
    .filter(e=>e.type==='DAILY'||e.type==='MASTER_HIGH'||e.type==='MASTER_LOW');
  if(!earned.length){ toast('적립할 포인트가 없습니다',true); return; }
  const total = earned.reduce((a,e)=>a+e.points,0);
  if(!confirm(`${s.name} — ${earned.map(e=>e.label+' +'+e.points.toLocaleString()+'P').join(', ')} 적립하시겠어요?`)) return;
  const pd = pointsData[sid]||{balance:0,history:[],attendSettled:[]};
  for(const e of earned){
    pd.balance = (pd.balance||0)+e.points;
    pd.history = [...(pd.history||[]),{
      id:'h'+Date.now()+Math.random(),
      type:e.type, label:e.label, points:e.points,
      note:e.note, year, month,
      date:dk(new Date()), by:session?.username||'',
    }];
  }
  await savePointsData(sid, pd);
  toast(`+${total.toLocaleString()}P 적립됐습니다`); render();
}

/* ── WEEKLY EXCEL EXPORT ── */
function exportWeeklyExcel(){
  const isPrin=session?.role==='principal';
  const allStuds=cfg.students||[];
  // 선생님이고 viewAll 꺼져있으면 본인 담당 학생만 엑셀에 포함
  const studs=(!isPrin && !st.viewAll)
    ? allStuds.filter(s=>isStudentOfTeacher(s, session?.username))
    : allStuds;
  if(!studs.length){ toast('학생이 없습니다',true); return; }

  // 학생별 4주차 계산 (rWeekly와 동일한 로직)
  const calcWeeks=(s)=>{
    const sessions=sessionsForMonthWithCycle(s.classType,st.year,st.month);
    if(!sessions.length) return [];
    const perWeek=Math.max(1, Math.round(sessions.length/4));
    const weeks=[];
    for(let i=0; i<sessions.length; i+=perWeek){
      const chunk=sessions.slice(i,i+perWeek);
      if(!chunk.length) break;
      weeks.push({weekNo:weeks.length+1, sessions:chunk, dates:chunk.map(x=>x.dateStr)});
      if(weeks.length>=4) break;
    }
    return weeks;
  };
  const calcStats=(sid, dates)=>{
    let attend=0,absent=0,late=0,hwScores=[],testScores=[];
    dates.forEach(d=>{
      const l=mdb.lessons[lk(sid,d)]; if(!l) return;
      if(l.attendance==='attend') attend++;
      else if(l.attendance==='absent') absent++;
      else if(l.attendance==='late') late++;
      const hs=parseFloat(l.homeworkScore); if(!isNaN(hs)) hwScores.push(hs);
      if(!l.testIsFullRange){
        const ts=parseFloat(l.testScore); if(!isNaN(ts)) testScores.push(ts);
      }
    });
    const hwAvg=hwScores.length?Math.round(hwScores.reduce((a,b)=>a+b,0)/hwScores.length):null;
    const testAvg=testScores.length?Math.round(testScores.reduce((a,b)=>a+b,0)/testScores.length):null;
    return {attend,absent,late,hwAvg,testAvg};
  };

  const wb=XLSX.utils.book_new();
  const rows=[['학생','반','주차','회차','출석','지각','결석','과제평균','시험평균','응용력','집중도','과제충실도','전범위 시험','메모','관리필요']];
  studs.forEach(s=>{
    const ct=CT()[s.classType];
    const weeks=calcWeeks(s);
    weeks.forEach(w=>{
      const stats=calcStats(s.id, w.dates);
      const wKey=`${st.year}-${String(st.month).padStart(2,'0')}-w${w.weekNo}`;
      const ev=getWkEval(s.id,wKey);
      const alerts=getAlerts(stats, ev);
      // 전범위 시험 (주차 범위 안)
      const sortedDates=[...w.dates].sort();
      const fullTests=getFullRangeTestsInWeek(s.id, sortedDates[0], sortedDates[sortedDates.length-1]);
      const fullTestText=fullTests.map(t=>{
        const ord=t.attempt===1?'시험':`${t.attempt}차시험`;
        return `${t.textbookName} 전범위 ${ord}: ${t.score}점 ${t.passed?'합격':'불합격'}`;
      }).join(' / ');
      const sessionRange=w.sessions.length?`${w.sessions[0].sessionNo}~${w.sessions[w.sessions.length-1].sessionNo}회차`:'';
      rows.push([
        s.name, ct?.label||s.classType, `${w.weekNo}주차`, sessionRange,
        stats.attend, stats.late, stats.absent,
        stats.hwAvg!==null?stats.hwAvg:'',
        stats.testAvg!==null?stats.testAvg:'',
        ev.app||'', ev.focus||'', ev.hw||'',
        fullTestText,
        ev.memo||'',
        alerts.length?'⚠️ '+alerts.map(a=>a.text).join(', '):''
      ]);
    });
  });
  const ws=XLSX.utils.aoa_to_sheet(rows);
  ws['!cols']=[{wch:10},{wch:12},{wch:8},{wch:12},{wch:6},{wch:6},{wch:6},{wch:10},{wch:10},{wch:8},{wch:8},{wch:10},{wch:40},{wch:24},{wch:30}];
  XLSX.utils.book_append_sheet(wb,ws,`${st.year}년 ${st.month}월 주간요약`);
  XLSX.writeFile(wb,`주간요약_${st.year}${String(st.month).padStart(2,'0')}.xlsx`);
  toast('주간요약 엑셀 다운로드 완료');
}

/* ── MATRIX ── */
function rMatrix(){
  const isPrin=session?.role==='principal';
  const teacherFilter=isPrin?(st.matrixTeacher||''):'';
  const allCTs=CT();

  // 큰 틀 그룹 정의 (요일 패턴 기준)
  const daySetStr=(days)=>[...days].sort((a,b)=>a-b).join(',');
  const BASE_GROUPS=[
    {key:'mw',  label:'월수반',   dayPat:'1,3'},
    {key:'mwf', label:'월수금반', dayPat:'1,3,5'},
    {key:'tt',  label:'화목반',   dayPat:'2,4'},
    {key:'ttf', label:'화목금반', dayPat:'2,4,5'},
  ];

  // 큰 틀 드롭다운: 해당 큰 틀에 속하는 classType이 있는 것만 표시
  const groupsWithClasses=BASE_GROUPS.filter(g=>
    Object.values(allCTs).some(ct=>daySetStr(ct.days||[])===g.dayPat)
  );

  // 현재 선택: 큰 틀 key ('__all__' = 전체)
  const selGroup=st.matrixGroup||'__all__';
  const curGroup=BASE_GROUPS.find(g=>g.key===selGroup)||null;

  // 전체 반: 등록된 모든 classType
  const allClsEntries=Object.entries(allCTs).sort(([,a],[,b])=>{
    const baseOrder=['MW','MWF','TT','TTF'];
    const oa=baseOrder.indexOf(a.baseType||''), ob=baseOrder.indexOf(b.baseType||'');
    return (oa<0?99:oa)-(ob<0?99:ob);
  });

  // 선택된 그룹에 해당하는 classType 목록
  const clsInGroup= selGroup==='__all__'
    ? allClsEntries
    : allClsEntries.filter(([k,v])=>daySetStr(v.days||[])===curGroup?.dayPat);

  const groupOpts=`<option value="__all__" ${selGroup==='__all__'?'selected':''}>전체 반</option>`
    +groupsWithClasses.map(g=>`<option value="${g.key}" ${selGroup===g.key?'selected':''}>${g.label}</option>`).join('');

  if(!clsInGroup.length){
    return `<div class="toolbar">
      <div class="tleft">
        <select onchange="st.matrixGroup=this.value;render()" style="font-size:13px;font-weight:600">
          ${groupOpts}
        </select>
      </div>
    </div><div class="empty">등록된 반이 없습니다.<br><small style="color:var(--text3)">설정 탭에서 반을 먼저 추가해주세요.</small></div>`;
  }

  const todayStr=dk(new Date());

  let h=`<div class="toolbar">
    <div class="tleft" style="flex-wrap:wrap;gap:8px">
      <select onchange="st.matrixGroup=this.value;render()" style="font-size:13px;font-weight:600;padding:5px 10px">
        ${groupOpts}
      </select>
      ${isPrin?`<select onchange="setMTeacher(this.value)" title="선생님별 필터">
        <option value="" ${!teacherFilter?'selected':''}>👩‍🏫 전체 선생님</option>
        ${allTeachers().map(t=>`<option value="${esc(t)}" ${teacherFilter===t?'selected':''}>${esc(t)}</option>`).join('')}
      </select>`:''}
    </div>
    <button class="btn btn-green" onclick="exportExcel()">📥 엑셀 다운로드</button>
  </div>`;

  // 교시별로 각각 테이블 렌더
  let anyRendered=false;
  clsInGroup.forEach(([cls, ct])=>{
    let studs=(cfg.students||[]).filter(s=>s.classType===cls);
    if(teacherFilter) studs=studs.filter(s=>isStudentOfTeacher(s,teacherFilter));
    if(!isPrin && !st.viewAll) studs=studs.filter(s=>isStudentOfTeacher(s,session?.username));
    if(!studs.length) return;

    const monthSessions=sessionsForMonthWithCycle(cls,st.year,st.month);
    const dates=monthSessions.map(x=>x.dateStr);
    if(!dates.length) return;

    // 데일리테스트 평균 계산 (결석·전범위 제외)
    window._matrixTestAvg=window._matrixTestAvg||{};
    studs.forEach(s=>{
      const scores=dates.map(d=>{
        const l=getLesson(s.id,d);
        if(!l||l.attendance==='absent'||l.testIsFullRange) return null;
        const v=parseFloat(l.testScore); return isNaN(v)?null:v;
      }).filter(v=>v!==null);
      window._matrixTestAvg[s.id]=scores.length?Math.round(scores.reduce((a,b)=>a+b,0)/scores.length):null;
    });

    const satDays=getMakeupDays();
    const mergedCols=[];
    monthSessions.forEach(info=>mergedCols.push({type:'session',dateStr:info.dateStr,sessionNo:info.sessionNo,info}));
    satDays.forEach(e=>mergedCols.push({type:'sat',dateStr:e.date}));
    mergedCols.sort((a,b)=>a.dateStr.localeCompare(b.dateStr));

    // 교시 헤더
    const periodLabel=ct.period?`${ct.period}교시`:'';
    h+=`<div style="margin-bottom:20px">
      <div style="padding:8px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--rl) var(--rl) 0 0;display:flex;align-items:center;gap:8px">
        <span class="badge ${ct.badge||'b-mwf'}">${esc(ct.label)}</span>
        ${periodLabel?`<b style="font-size:14px">⏰ ${periodLabel}</b>`:''}
        <span style="font-size:12px;color:var(--text2)">${studs.length}명</span>
      </div>`;
    h+=renderMatrixTable(studs,mergedCols,todayStr,cls);
    h+=`</div>`;
    anyRendered=true;
  });

  if(!anyRendered){
    h+=`<div class="empty">${curGroup?.label||''} 에 표시할 학생이 없습니다.</div>`;
  }
  return h;
}

function renderMatrixTable(studs,mergedCols,todayStr,cls){
  let h=`<div class="matrix-wrap" id="matrixWrap"><table class="mtbl"><thead><tr><th class="col-student hdr" rowspan="2">학생</th>`;
  mergedCols.forEach(col=>{
    const d=col.dateStr;
    const isT=d===todayStr;
    const dl=DAY[parseDate(d).getDay()];
    if(col.type==='session'){
      const dDate=parseDate(d);
      const dY=dDate.getFullYear(), dM=dDate.getMonth()+1;
      const isOtherMonth=(dY!==st.year || dM!==st.month);
      const isPrevMonth=isOtherMonth && (dY<st.year || (dY===st.year && dM<st.month));
      const overflowCls=isOtherMonth?' overflow-month':'';
      const monthLabel=isOtherMonth?`<span style="font-size:9px;color:#a05a00;font-weight:600;display:block">${isPrevMonth?'↰':'↳'} ${dM}월</span>`:'';
      h+=`<th class="sess-group${isT?' today-g':''}${overflowCls}" colspan="7">
        ${col.sessionNo}회차
        <span style="font-size:9px;font-weight:400">${d.slice(5)} (${dl})</span>
        ${monthLabel}
      </th>`;
    } else {
      // 토요보강
      h+=`<th class="sess-group sat-group${isT?' today-g':''}" colspan="7">
        <span style="color:#7a4e00">📅 토요보강</span>
        <span style="font-size:9px;font-weight:400">${d.slice(5)} (${dl})</span>
      </th>`;
    }
  });
  h+=`</tr><tr>`;
  mergedCols.forEach(col=>{
    const isT=col.dateStr===todayStr;
    const isSat=col.type==='sat';
    SUBS.forEach(sc=>{
      h+=`<th class="sub-hdr${isSat?' sat-sub':''}${isT?' today-g':''}">${sc}</th>`;
    });
  });
  h+=`</tr></thead><tbody>`;

  studs.forEach((s,ri)=>{
    const scheduleChips = studentScheduleChips(s);
    const testAvg=window._matrixTestAvg?window._matrixTestAvg[s.id]:null;
    const avgChip=testAvg!==null?`<span style="font-size:10px;font-weight:700;background:${testAvg>=80?'var(--green-bg)':'var(--amber-bg)'};color:${testAvg>=80?'var(--green)':'var(--amber)'};border-radius:8px;padding:1px 6px;border:1px solid ${testAvg>=80?'#80c090':'#e0c060'}">시험 평균 ${testAvg}점</span>`:'';
    const specialNote=s.specialNote||'';
    h+=`<tr class="${ri%2===0?'row-e':'row-o'}"><td class="col-student">
      <div style="display:flex;align-items:center;gap:4px;flex-wrap:wrap">
        <span style="font-weight:600">${s.name}</span>
        ${s.grade?gradeBadge(s.grade):''}
        ${s.level?levelBadge(s.level):''}
      </div>
      ${scheduleChips?`<div style="display:flex;flex-wrap:wrap;gap:3px;margin-top:3px">${scheduleChips}</div>`:''}
      ${avgChip?`<div style="margin-top:3px">${avgChip}</div>`:''}
      ${specialNote?`<div style="font-size:10px;color:#5a2080;background:#f3e8fc;border-radius:4px;padding:2px 5px;margin-top:3px;font-weight:600">📌 ${esc(specialNote)}</div>`:''}
    </td>`;
    mergedCols.forEach(col=>{
      const d=col.dateStr;
      const isT=d===todayStr;
      const tc=isT?' today-cell':'';
      const isSat=col.type==='sat';

      if(isSat){
        // 토요보강: 이 학생이 신청했는지 확인
        const satEntry=getMkEntryByDate(d);
        const studArr=satEntry?getMakeupStudents(satEntry):[];
        const myMakeup=studArr.find(x=>x.id===s.id);
        if(!myMakeup){
          // 보강 신청 안 함 → 등록 버튼만 표시
          h+=`<td class="dcell c${tc} sat-empty" colspan="7" style="background:#f8f8f5;text-align:center;padding:10px"><button class="btn btn-sm" style="font-size:10px;padding:2px 8px" onclick="addStudentToSatDay('${s.id}','${d}')">+ 보강 등록</button></td>`;
        } else {
          const l=getLesson(s.id,d)||{};
          const att=l.attendance||'';
          h+=`<td class="dcell c${tc} sat-cell">
            <div style="font-size:9px;color:#7a4e00;text-align:center;font-weight:600;margin-bottom:2px">${myMakeup.period?myMakeup.period+'교시':''}${myMakeup.teacher?' · '+esc(myMakeup.teacher):''}</div>
            <div class="ab-wrap">
              <button class="abm${att==='attend'?' on-attend':''}" onclick="mAttend('${s.id}','${d}','attend')">출</button>
              <button class="abm${att==='late'?' on-late':''}" onclick="mAttend('${s.id}','${d}','late')">지</button>
              <button class="abm${att==='absent'?' on-absent':''}" onclick="mAttend('${s.id}','${d}','absent')">결</button>
            </div>
          </td>`;
          h+=`<td class="dcell c${tc} sat-cell"><input class="sinp" type="text" value="${esc(l.homeworkScore||'')}" placeholder="-" onblur="mSave('${s.id}','${d}','homeworkScore',this.value)"></td>`;
          // 시험점수 셀
          const sTbsXs=(s.textbooks||[]);
          const starBtnS = sTbsXs.length ? `<button title="전범위 시험 입력" style="display:block;width:100%;font-size:9px;padding:0px 2px;border:1px solid var(--amber);border-radius:4px;background:var(--amber-bg);color:var(--amber);cursor:pointer;font-weight:700;margin-bottom:2px;line-height:1.2" onclick="openM('addTest','${s.id}','','${d}')">✱ 전범위</button>` : '';
          h+=`<td class="dcell c${tc} sat-cell">${starBtnS}<input class="sinp" type="text" value="${esc(l.testScore||'')}" placeholder="-" onblur="mSave('${s.id}','${d}','testScore',this.value)" style="${l.testIsFullRange?'background:#fff8e8':''}">${l.testIsFullRange&&l.testScore?'<div style="font-size:9px;color:var(--amber);font-weight:700;text-align:center;margin-top:1px">전범위</div>':''}</td>`;
          h+=`<td class="dcell${tc} sat-cell" style="min-width:100px;max-width:130px"><textarea class="tinp" onblur="mSave('${s.id}','${d}','progress',this.value)">${esc(l.progress||'')}</textarea></td>`;
          // 이전 과제 표시 (정규 회차랑 똑같이)
          const ph=prevHwInMonth(s.id,d,cls,st.year,st.month);
          h+=`<td class="dcell${tc} sat-cell" style="min-width:100px;max-width:130px">${ph?`<span class="prev-chip" title="${esc(ph)}">📋 ${esc(ph)}</span>`:''}<textarea class="tinp" onblur="mSaveHw('${s.id}','${d}','${cls}',this.value)">${esc(l.homework||'')}</textarea></td>`;
          h+=`<td class="dcell c${tc} sat-cell"><span class="chk" onclick="mToggle('${s.id}','${d}','makeupClass')">${l.makeupClass?'✅':'☐'}</span></td>`;
          h+=`<td class="dcell${tc} sat-cell" style="min-width:90px;max-width:130px"><textarea class="tinp" onblur="mSave('${s.id}','${d}','note',this.value)">${esc(l.note||'')}</textarea></td>`;
        }
      } else {
        // 정규 회차
        const l=getLesson(s.id,d)||{};const att=l.attendance||'';
        const mkReq = att==='absent' ? l.makeupRequest : null;
        const mkChip = att==='absent'
          ? (mkReq
              ? `<div style="font-size:9px;color:#3a6818;margin-top:2px;cursor:pointer;text-align:center" title="${mkReq.date} ${mkReq.period}교시 · ${esc(mkReq.teacher||'')}\\n클릭하여 취소" onclick="cancelMakeupRequest('${s.id}','${d}')">✅ 보강${mkReq.date.slice(5)}</div>`
              : `<div style="font-size:9px;margin-top:2px;text-align:center"><button class="btn btn-sm" style="font-size:9px;padding:1px 5px" onclick="openM('requestMakeup','${s.id}','${d}')">+보강</button></div>`)
          : '';
        h+=`<td class="dcell c${tc}"><div class="ab-wrap"><button class="abm${att==='attend'?' on-attend':''}" onclick="mAttend('${s.id}','${d}','attend')">출</button><button class="abm${att==='late'?' on-late':''}" onclick="mAttend('${s.id}','${d}','late')">지</button><button class="abm${att==='absent'?' on-absent':''}" onclick="mAttend('${s.id}','${d}','absent')">결</button></div>${mkChip}</td>`;
        h+=`<td class="dcell c${tc}"><input class="sinp" type="text" value="${esc(l.homeworkScore||'')}" placeholder="-" onblur="mSave('${s.id}','${d}','homeworkScore',this.value)"></td>`;
        // 시험점수 셀: 위에 ✱ 버튼 (교재 있을 때) + 점수 옆에 * 표시 (전범위면)
        const sTbsX=(s.textbooks||[]);
        const starBtn = sTbsX.length ? `<button title="전범위 시험 입력" style="display:block;width:100%;font-size:9px;padding:0px 2px;border:1px solid var(--amber);border-radius:4px;background:var(--amber-bg);color:var(--amber);cursor:pointer;font-weight:700;margin-bottom:2px;line-height:1.2" onclick="openM('addTest','${s.id}','','${d}')">✱ 전범위</button>` : '';
        const testDisplay = l.testScore ? `${esc(l.testScore)}${l.testIsFullRange?'<span style="color:var(--amber);font-weight:700">*</span>':''}` : '';
        h+=`<td class="dcell c${tc}">${starBtn}<input class="sinp" type="text" value="${esc(l.testScore||'')}" placeholder="-" onblur="mSave('${s.id}','${d}','testScore',this.value)" style="${l.testIsFullRange?'background:#fff8e8':''}">${l.testIsFullRange&&l.testScore?'<div style="font-size:9px;color:var(--amber);font-weight:700;text-align:center;margin-top:1px">전범위</div>':''}</td>`;
        h+=`<td class="dcell${tc}" style="min-width:100px;max-width:130px"><input type="text" class="tinp" style="font-size:10px;color:var(--purple);border-bottom:1px dashed #d4a0f0;margin-bottom:2px;padding-bottom:2px;width:100%" placeholder="목표진도..." value="${esc(l.targetProgress||'')}" onblur="mSave('${s.id}','${d}','targetProgress',this.value)"><textarea class="tinp" onblur="mSave('${s.id}','${d}','progress',this.value)">${esc(l.progress||'')}</textarea></td>`;
        const ph=prevHwInMonth(s.id,d,cls,st.year,st.month);
        h+=`<td class="dcell${tc}" style="min-width:100px;max-width:130px">${ph?`<span class="prev-chip" title="${esc(ph)}">📋 ${esc(ph)}</span>`:''}<textarea class="tinp" onblur="mSaveHw('${s.id}','${d}','${cls}',this.value)">${esc(l.homework||'')}</textarea></td>`;
        h+=`<td class="dcell c${tc}"><span class="chk" onclick="mToggle('${s.id}','${d}','makeupClass')">${l.makeupClass?'✅':'☐'}</span></td>`;
        h+=`<td class="dcell${tc}" style="min-width:90px;max-width:130px"><textarea class="tinp" onblur="mSave('${s.id}','${d}','note',this.value)">${esc(l.note||'')}</textarea></td>`;
      }
    });
    h+=`</tr>`;
  });
  h+=`</tbody></table></div>`;return h;
}

/* 오늘입력 학생 카드 (재사용 가능) */

  // 보조 선생님: 출결 + 이전 과제 확인 + 당일 과제점수만 입력 가능한 간소화 카드
  if(session?.role==='assistant'){
    const attLabel = att==='attend'?'✅ 출석':att==='late'?'⏰ 지각':att==='absent'?'❌ 결석':'';
    return `<div class="today-card" style="border-left:3px solid var(--blue)">

          <button class="abm${att==='absent'?' on-absent':''}" onclick="tAttend('${s.id}','${dateStr}','absent')">결</button>
        </div>
      </div>
      ${ph?`<div style="margin-bottom:8px">
        <div class="field-lbl">지난 시간 과제</div>
        <div class="prev-box" style="user-select:text;cursor:default">📋 ${esc(ph)}</div>
      </div>`:''}
      <div style="margin-bottom:2px">
        <div class="field-lbl">과제 점수</div>
        <input class="sinp-full" type="text" value="${esc(l.homeworkScore||'')}" placeholder="점수 입력 (예: 85, A+)" onblur="tSave('${s.id}','${dateStr}','${s.classType}','homeworkScore',this.value)" style="font-size:13px;font-weight:600;text-align:center">

  return `<div class="today-card">
    <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px;flex-wrap:wrap">

      <div style="display:flex;gap:3px;margin-left:auto;align-items:center">

    </div>
    ${specialNote?`<div style="font-size:11px;color:#5a2080;background:#f3e8fc;border:1px solid #d4a0f0;border-radius:5px;padding:4px 8px;margin-bottom:6px;font-weight:600">📌 ${esc(specialNote)}</div>`:''}
    ${att==='absent'?renderMakeupRequestRow(s.id, dateStr):''}
    <div style="margin-bottom:6px"><div class="field-lbl">목표진도</div><input type="text" class="sinp-full" value="${esc(l.targetProgress||'')}" placeholder="이번 수업 목표 진도를 입력하세요" onblur="tSave('${s.id}','${dateStr}','${s.classType}','targetProgress',this.value)"></div>
    <div class="score-row">
      <div><div class="field-lbl">과제점수</div><input class="sinp-full" type="text" value="${esc(l.homeworkScore||'')}" placeholder="-" onblur="tSave('${s.id}','${dateStr}','${s.classType}','homeworkScore',this.value)"></div>

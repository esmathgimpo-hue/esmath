<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>학원 관리 시스템</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fff;--bg2:#f6f6f4;--bg3:#eeeeed;
  --text:#1a1a1a;--text2:#666;--text3:#aaa;
  --border:#e2e2de;--border2:#ccc;
  --blue:#1558a8;--blue-bg:#e5effc;
  --green:#1e6e3a;--green-bg:#e2f2e9;
  --amber:#7a4e00;--amber-bg:#fdf0d8;
  --purple:#5a2080;--purple-bg:#f3e8fc;
  --red:#a02828;--red-bg:#fce6e6;
  --teal:#1a6a60;--teal-bg:#e0fcf8;
  --r:8px;--rl:12px;
}
body{font-family:'Malgun Gothic','Apple SD Gothic Neo',sans-serif;background:var(--bg2);color:var(--text);font-size:13px;min-height:100vh}

/* ── LOGIN SCREEN ── */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg2)}
.login-box{background:var(--bg);border:1px solid var(--border);border-radius:var(--rl);padding:36px;width:340px;box-shadow:0 4px 24px rgba(0,0,0,.08)}
.login-box h1{font-size:20px;font-weight:700;margin-bottom:6px;text-align:center}
.login-box .sub{font-size:12px;color:var(--text3);text-align:center;margin-bottom:28px}
.login-box .frow{margin-bottom:14px}
.login-box label{display:block;font-size:11px;font-weight:600;color:var(--text2);margin-bottom:4px}
.login-box input{width:100%;padding:9px 12px;border:1px solid var(--border2);border-radius:var(--r);font-size:13px;font-family:inherit}
.login-box input:focus{outline:none;border-color:var(--blue)}
.login-btn{width:100%;padding:10px;background:var(--text);color:#fff;border:none;border-radius:var(--r);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:4px}
.login-btn:hover{opacity:.88}
.login-err{font-size:12px;color:var(--red);margin-top:10px;text-align:center;min-height:18px}
.gas-url-row{margin-bottom:20px}
.gas-url-row input{font-size:11px;padding:7px 10px}
.gas-url-row .hint{font-size:10px;color:var(--text3);margin-top:3px}

/* ── APP SHELL ── */
#app-screen{display:none}
.topbar{background:var(--bg);border-bottom:1px solid var(--border);padding:0 16px;display:flex;align-items:center;justify-content:space-between;height:50px;position:sticky;top:0;z-index:100;gap:8px;flex-wrap:wrap}
.logo{font-size:15px;font-weight:700;letter-spacing:-.3px;white-space:nowrap}
.tabs{display:flex;gap:2px}
.tab{padding:6px 14px;font-size:13px;border:none;background:transparent;color:var(--text2);cursor:pointer;border-radius:var(--r);font-family:inherit}
.tab:hover{background:var(--bg2)}
.tab.active{background:var(--text);color:#fff;font-weight:600}
.month-sel{display:flex;align-items:center;gap:6px;font-size:13px}
.month-sel select{padding:4px 8px;font-size:13px;border:1px solid var(--border2);border-radius:var(--r);background:var(--bg);font-family:inherit;font-weight:600}
.user-chip{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2);flex-shrink:0;flex-wrap:nowrap}
.user-chip .uname{font-weight:600;color:var(--text);white-space:nowrap}
.user-chip .badge{white-space:nowrap}
.main{padding:16px 20px}
.btn{padding:6px 13px;font-size:12px;border:1px solid var(--border2);border-radius:var(--r);cursor:pointer;background:var(--bg);color:var(--text);font-family:inherit}
.btn:hover{background:var(--bg3)}
.btn-primary{background:var(--text);color:#fff;border-color:var(--text)}
.btn-primary:hover{opacity:.85}
.btn-green{background:var(--green);color:#fff;border-color:var(--green)}
.btn-green:hover{opacity:.85}
.btn-blue{background:var(--blue);color:#fff;border-color:var(--blue)}
.btn-blue:hover{opacity:.85}
.btn-red{background:var(--red);color:#fff;border-color:var(--red)}
.btn-sm{padding:3px 9px;font-size:11px}
.badge{display:inline-flex;align-items:center;font-size:10px;padding:2px 7px;border-radius:20px;font-weight:600;white-space:nowrap}
.b-mwf{background:var(--blue-bg);color:var(--blue)}
.b-ttf{background:var(--green-bg);color:var(--green)}
.b-mw{background:var(--amber-bg);color:var(--amber)}
.b-tt{background:var(--purple-bg);color:var(--purple)}
.b-sat{background:var(--teal-bg);color:var(--teal)}
.b-principal{background:#1a1a1a;color:#fff}
.b-grade{background:#eef0f3;color:#3a4555;border:1px solid #d8dde5}
.b-lvl{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:50%;font-size:11px;font-weight:700;border:1px solid}
.toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.tleft{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
select,input[type=text],input[type=date],input[type=number]{padding:5px 9px;font-size:12px;border:1px solid var(--border2);border-radius:var(--r);background:var(--bg);color:var(--text);font-family:inherit}

/* SYNC STATUS */
.sync-bar{display:flex;align-items:center;gap:8px;font-size:11px;padding:6px 12px;background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:50px;z-index:99}
.sync-dot{width:8px;height:8px;border-radius:50%;background:var(--text3)}
.sync-dot.ok{background:#2a9a4a}
.sync-dot.err{background:var(--red)}
.sync-dot.syncing{background:var(--amber);animation:pulse .8s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* MATRIX */
.matrix-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:var(--rl);background:var(--bg);max-height:calc(100vh - 145px);overflow-y:auto}
.mtbl{border-collapse:collapse;min-width:100%;table-layout:auto}
.mtbl th,.mtbl td{border:1px solid var(--border)}
.col-student{position:sticky;left:0;z-index:15;background:var(--bg2);min-width:120px;width:120px;padding:6px 10px;font-weight:600;font-size:12px}
.col-student.hdr{background:var(--bg3);text-align:center;z-index:25;top:0}
.sess-group{text-align:center;padding:5px 4px;background:#f0f4fa;font-weight:700;font-size:11px;color:var(--text);position:sticky;top:0;z-index:12;white-space:nowrap}
.sess-group.today-g{background:#e8f1fa;color:var(--blue)}
.sess-group.overflow-month{background:#fff3e0;color:#a05a00;border-left:2px dashed #d0a868}
.sess-group.sat-group{background:#fdf0d8;color:#7a4e00;border-left:3px solid #e0c060}
.sub-hdr.sat-sub{background:#fef5e7;color:#7a4e00}
.dcell.sat-cell{background:#fffbef!important;border-left:1px solid #f0d090}
.dcell.sat-empty{border-left:1px solid #e8d8b8}
.row-e .dcell.sat-cell{background:#fffbef!important}
.row-o .dcell.sat-cell{background:#fdf6e2!important}
.sub-hdr{text-align:center;padding:4px 3px;background:var(--bg3);font-size:10px;color:var(--text2);font-weight:600;white-space:nowrap;position:sticky;top:28px;z-index:12}
.sub-hdr.today-g{background:#fff5cc}
.dcell{padding:3px;vertical-align:top}
.dcell.c{text-align:center;vertical-align:middle}
.ab-wrap{display:flex;gap:2px;justify-content:center;flex-wrap:wrap;padding:2px}
.abm{padding:2px 5px;font-size:10px;border:1px solid var(--border2);border-radius:10px;cursor:pointer;background:transparent;color:var(--text2);font-family:inherit;line-height:1.3;white-space:nowrap}
.abm:hover{background:var(--bg2)}
.abm.on-attend{background:var(--green-bg);color:var(--green);border-color:var(--green)}
.abm.on-late{background:var(--amber-bg);color:var(--amber);border-color:#c48a00}
.abm.on-absent{background:var(--red-bg);color:var(--red);border-color:#c05050}
.sinp{width:50px;border:none;border-radius:4px;padding:3px 4px;font-size:11px;text-align:center;background:var(--bg2);color:var(--text);font-family:inherit}
.sinp:focus{outline:2px solid var(--blue);background:#fff}
.tinp{width:100%;border:none;background:transparent;font-size:11px;color:var(--text);font-family:inherit;resize:none;min-height:36px;padding:2px 3px;line-height:1.45}
.tinp:focus{outline:none;background:#f0f5ff;border-radius:3px}
.prev-chip{font-size:9px;color:var(--text2);background:var(--bg2);border-radius:3px;padding:1px 4px;margin-bottom:2px;display:block;line-height:1.4;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:110px}
.chk{font-size:13px;cursor:pointer;user-select:none;display:block;text-align:center}
.row-e .dcell,.row-e .col-student{background:var(--bg)}
.row-o .dcell,.row-o .col-student{background:#fafaf9}
.today-cell{background:#fffbec !important}
.carry-banner{background:var(--blue-bg);border:1px solid #b0cef0;border-radius:var(--rl);padding:10px 14px;margin-bottom:12px;font-size:12px;color:var(--blue)}

/* TODAY */
.timeslot-hdr{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--rl) var(--rl) 0 0;margin-top:16px;border-bottom:none}
.timeslot-hdr:first-child{margin-top:0}
.timeslot-body{border:1px solid var(--border);border-radius:0 0 var(--rl) var(--rl);margin-bottom:16px;overflow:hidden}
.student-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:0}
.today-card{padding:12px 14px;border-right:1px solid var(--border);border-bottom:1px solid var(--border)}
.field-lbl{font-size:10px;color:var(--text3);margin-bottom:3px;font-weight:600;text-transform:uppercase;letter-spacing:.3px}
.prev-box{font-size:11px;color:#7a4e00;background:#fff8e8;border:1px solid #e8d5a0;border-radius:5px;padding:5px 8px;margin-bottom:5px;line-height:1.5;font-weight:500}
.tarea{width:100%;border:1px solid var(--border);border-radius:var(--r);padding:5px 8px;font-size:11px;min-height:42px;resize:vertical;font-family:inherit;line-height:1.45}
.tarea:focus{outline:none;border-color:var(--blue)}
.score-row{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px}
.sinp-full{width:100%;border:1px solid var(--border);border-radius:var(--r);padding:4px 7px;font-size:11px;text-align:center;font-family:inherit;background:var(--bg2)}
.sinp-full:focus{outline:2px solid var(--blue);background:#fff}

/* STUDENTS / SETTINGS */
.sgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:8px;margin-bottom:16px}
.scard{background:var(--bg);border:1px solid var(--border);border-radius:var(--rl);padding:12px 14px;display:flex;align-items:center;gap:10px}
.avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
.stat{background:var(--bg);border:1px solid var(--border);border-radius:var(--rl);padding:12px;text-align:center}
.stat .num{font-size:22px;font-weight:700}
.stat .lbl{font-size:10px;color:var(--text2);margin-top:2px}
.card{background:var(--bg);border:1px solid var(--border);border-radius:var(--rl);padding:14px;margin-bottom:12px}
.notice{font-size:12px;background:var(--amber-bg);border:1px solid #e8c860;border-radius:var(--r);padding:8px 12px;margin-bottom:12px;color:#5a3c00}
.info-box{font-size:12px;background:var(--blue-bg);border:1px solid #b0cef0;border-radius:var(--r);padding:8px 12px;margin-bottom:12px;color:#1a4a80;line-height:1.7}
.hi{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);font-size:12px}
.hi:last-child{border-bottom:none}
.empty{text-align:center;padding:40px;color:var(--text3);font-size:13px}
.sec-lbl{font-size:10px;font-weight:700;color:var(--text2);margin-bottom:7px;text-transform:uppercase;letter-spacing:.4px}

/* teacher assignment table */
.assign-tbl{width:100%;border-collapse:collapse;font-size:12px}
.assign-tbl th{background:var(--bg2);padding:7px 10px;text-align:left;border-bottom:1px solid var(--border);font-weight:600}
.assign-tbl td{padding:7px 10px;border-bottom:1px solid var(--border);vertical-align:top}
.assign-tbl tr:last-child td{border-bottom:none}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.42);z-index:300;display:flex;align-items:center;justify-content:center}
.modal{background:var(--bg);border-radius:var(--rl);padding:22px;width:420px;max-width:95vw;box-shadow:0 8px 32px rgba(0,0,0,.2);max-height:90vh;overflow-y:auto}
.modal h3{font-size:15px;font-weight:700;margin-bottom:16px}
.frow{margin-bottom:13px}
.frow label{display:block;font-size:11px;color:var(--text2);margin-bottom:4px;font-weight:600}
.chip-group{display:flex;gap:6px;flex-wrap:wrap}
.chip{padding:4px 11px;font-size:12px;border:1px solid var(--border2);border-radius:20px;cursor:pointer;background:transparent;color:var(--text2);font-family:inherit}
.chip.sel{background:var(--text);color:#fff;border-color:var(--text)}
.mfoot{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;padding-top:12px;border-top:1px solid var(--border)}
.day-chips{display:flex;gap:5px;flex-wrap:wrap}
.day-chip{width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:12px;border:1px solid var(--border2);border-radius:50%;cursor:pointer;background:transparent;color:var(--text2);font-family:inherit}
.day-chip.sel{background:var(--text);color:#fff;border-color:var(--text)}
.day-chip.sun{color:#c05050}.day-chip.sat{color:#1558a8}

/* ── WEEKLY TAB ── */
.wk-section{margin-bottom:28px}
.wk-title{font-size:14px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:10px}
.wk-range{font-size:12px;color:var(--text2);font-weight:400}
.alert-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.alert-badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:3px 9px;border-radius:20px;font-weight:600}
.alert-red{background:var(--red-bg);color:var(--red);border:1px solid #e0a0a0}
.alert-amber{background:var(--amber-bg);color:var(--amber);border:1px solid #e0c060}
.alert-green{background:var(--green-bg);color:var(--green);border:1px solid #80c090}
.alert-blue{background:var(--blue-bg);color:var(--blue);border:1px solid #90b8e8}
.wk-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px}
.wk-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden}
.wk-card-hdr{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.wk-card-body{padding:12px 14px}
.att-pills{display:flex;gap:4px;margin-left:auto}
.att-pill{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:600}
.pill-a{background:var(--green-bg);color:var(--green)}
.pill-l{background:var(--amber-bg);color:var(--amber)}
.pill-x{background:var(--red-bg);color:var(--red)}
.pill-n{background:var(--bg2);color:var(--text3)}
/* star rating */
.stars{display:flex;gap:2px}
.star{font-size:16px;cursor:pointer;color:#ddd;transition:color .1s;line-height:1}
.star.on{color:#f5a623}
.star:hover{color:#f5a623}
.eval-row{display:grid;grid-template-columns:80px 1fr;align-items:center;gap:8px;margin-bottom:8px}
.eval-lbl{font-size:11px;color:var(--text2);font-weight:600}
.wk-memo{width:100%;border:1px solid var(--border);border-radius:var(--r);padding:5px 8px;font-size:11px;font-family:inherit;resize:none;min-height:38px}
.wk-memo:focus{outline:none;border-color:var(--blue)}
.needs-care{border-left:3px solid var(--red) !important}
.wk-summary-bar{background:var(--bg);border:1px solid var(--border);border-radius:var(--rl);padding:14px 16px;margin-bottom:16px}
.wk-filter-tabs{display:flex;gap:4px;margin-bottom:14px;flex-wrap:wrap}
.wk-ftab{padding:5px 12px;font-size:12px;border:1px solid var(--border2);border-radius:20px;cursor:pointer;background:transparent;color:var(--text2);font-family:inherit}
.wk-ftab.active{background:var(--text);color:#fff;border-color:var(--text)}
.care-header{display:flex;align-items:center;gap:8px;padding:10px 14px;background:#fff5f5;border:1px solid #f0b0b0;border-radius:var(--rl);margin-bottom:14px;font-size:13px;font-weight:600;color:var(--red)}
.score-avg{font-size:12px;color:var(--text2);background:var(--bg2);border-radius:4px;padding:2px 7px}
/* ── TEXTBOOK TAB ── */
.tb-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px;margin-bottom:16px}
.tb-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden}
.tb-card-hdr{padding:10px 14px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.tb-card-body{padding:12px 14px}
.tb-badge{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:600;background:var(--blue-bg);color:var(--blue);border:1px solid #b0d0f0}
.tb-badge-personal{background:var(--amber-bg);color:var(--amber);border-color:#e0c060}
.progress-bar-wrap{background:var(--bg3);border-radius:20px;height:8px;margin:6px 0 2px;overflow:hidden}
.progress-bar-fill{height:100%;border-radius:20px;background:var(--blue);transition:width .3s}
.progress-bar-fill.done{background:var(--green)}
.tb-progress-num{font-size:11px;color:var(--text2);text-align:right}
.tb-inp{width:60px;padding:3px 6px;border:1px solid var(--border);border-radius:var(--r);font-size:11px;text-align:center;font-family:inherit}
.tb-inp:focus{outline:none;border-color:var(--blue)}
.tb-section-title{font-size:12px;font-weight:700;color:var(--text2);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.tb-overview-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);flex-wrap:wrap}
.tb-overview-row:last-child{border-bottom:none}
.tb-student-name{font-weight:600;font-size:12px;min-width:60px}
.tb-book-name{font-size:12px;color:var(--text2);flex:1;min-width:80px}
.tb-pct{font-size:11px;font-weight:600;min-width:36px;text-align:right}
/* 전범위 시험 */
.test-pill{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:3px 9px;border-radius:20px;font-weight:600;white-space:nowrap}
.test-pass{background:#e2f2e9;color:#1e6e3a;border:1px solid #80c090}
.test-fail{background:#fce6e6;color:#a02828;border:1px solid #e0a0a0}
.test-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--border);flex-wrap:wrap}
.test-row:last-child{border-bottom:none}
.test-attempt{font-size:11px;font-weight:700;color:var(--text3);min-width:34px}
.test-score-big{font-size:18px;font-weight:700}
.pass-color{color:var(--green)}
.fail-color{color:var(--red)}
/* 학생 프로필 모달 */
.profile-modal{background:var(--bg);border-radius:var(--rl);width:600px;max-width:96vw;max-height:90vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.22)}
.profile-hdr{padding:18px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;position:sticky;top:0;background:var(--bg);z-index:5}
.profile-body{padding:18px 20px}
.profile-section{margin-bottom:22px}
.profile-section-title{font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.4px;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.tb-test-block{background:var(--bg2);border-radius:var(--r);padding:12px 14px;margin-bottom:10px}
.tb-test-block-hdr{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.final-status{display:inline-flex;align-items:center;gap:4px;font-size:12px;padding:3px 10px;border-radius:20px;font-weight:700}
.status-pass{background:var(--green-bg);color:var(--green)}
.status-fail{background:var(--red-bg);color:var(--red)}
.status-none{background:var(--bg3);color:var(--text3)}
.conflict-modal{background:var(--bg);border-radius:var(--rl);padding:22px;width:440px;max-width:95vw;box-shadow:0 8px 32px rgba(0,0,0,.25)}
.conflict-modal h3{font-size:15px;font-weight:700;margin-bottom:6px;color:var(--red)}
.conflict-who{font-size:13px;color:var(--text2);margin-bottom:14px}
.conflict-compare{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}

// ── 로그인 (아이디 목록 방식) ──
async function doLogin(){
  const username=document.getElementById('loginUser').value.trim();
  if(!username){ document.getElementById('loginErr').textContent='아이디를 입력해주세요'; return; }
  document.getElementById('loginErr').textContent='연결 중...';
  // Firebase 모듈 준비 대기 (최대 5초)
  let waited=0;
  while(!window._fbReady&&waited<5000){ await new Promise(r=>setTimeout(r,100)); waited+=100; }
  if(!window._fbReady){ document.getElementById('loginErr').textContent='Firebase 연결 실패. 새로고침 해주세요.'; return; }

  // USERS에 등록된 사용자 (원장)
  let u=USERS[username];
  if(!u){
    // cfg를 먼저 로드해서 등록된 선생님 명단에서 찾기
    if(!cfg) await loadConfig();
    const teachers=(cfg?.teachers||[]).filter(Boolean);
    if(teachers.includes(username)){
      const assistants=(cfg?.assistantTeachers||[]);
      const isAssistant=assistants.includes(username);
      u={ role:isAssistant?'assistant':'teacher', displayName:username+'님', username:username };
    }
  }
  if(!u){ document.getElementById('loginErr').textContent='등록되지 않은 아이디입니다. 원장 또는 등록된 선생님 이름으로 로그인해주세요.'; return; }

  session={ username:u.username, role:u.role, displayName:u.displayName };
  localStorage.setItem('session', JSON.stringify(session));
  await showApp();
}

function doLogout(){
  session=null; cfg=null; mdb=null;
  localStorage.removeItem('session');
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('app-screen').style.display='none';
}

async function showApp(){

  // 선생님은 전체 보기 토글 표시

  } else {
    vt.style.display='none';
  }
  buildMonthSel();

  // 역할별 탭 표시 제어
  if(session?.role==='assistant'){
    // 보조 선생님: 수업기록표·오늘입력·내담당반만
    document.querySelectorAll('.tab').forEach(el=>{
      const onclick=el.getAttribute('onclick')||'';
      el.style.display=(onclick.includes("'today'")||onclick.includes("'matrix'")||onclick.includes("'myclass'"))?'':'none';
    });
    const mct=document.getElementById('tab-myclass');
    if(mct) mct.style.display='';
    // 새로고침 후 탭 복원 (허용된 탭만)
    const savedTab=localStorage.getItem('lastTab')||'';
    if(savedTab==='matrix'||savedTab==='today'||savedTab==='myclass') st.tab=savedTab;
    else if(st.tab!=='matrix'&&st.tab!=='today') st.tab='myclass';
  } else {
    // 전임/원장: 내담당반 탭 숨김, 나머지 모두 표시
    document.querySelectorAll('.tab').forEach(el=>{ el.style.display=''; });
    const mct=document.getElementById('tab-myclass');
    if(mct) mct.style.display='none';
    // 새로고침 후 탭 복원
    const savedTab=localStorage.getItem('lastTab')||'';
    const validTabs=['matrix','today','weekly','monthly','points','schedule','students','special','settings'];
    if(savedTab&&validTabs.includes(savedTab)) st.tab=savedTab;
    else if(st.tab==='myclass') st.tab='today';
  }

  // ① 필수 데이터만 먼저 로드 (설정 + 이달 수업)
  setSyncState('syncing','설정 불러오는 중... (1/2)');
  await loadConfig();
  setSyncState('syncing','수업 기록 불러오는 중... (2/2)');
  await loadMonthData();
  setSyncState('ok','준비 완료');

  // ② 화면 먼저 표시
  render();

  // ③ 교재/시험 데이터는 백그라운드에서 조용히 로드
  loadTextbookProgress().then(()=>loadTextbookTests()).then(()=>loadPointsData()).then(()=>{

}

// ── 설정 로드/저장 ──
async function loadConfig(){
  const {getDoc}=fb();
  const snap=await getDoc(configDocRef());
  if(snap.exists()){
    cfg=snap.data();
  } else {
    cfg=JSON.parse(JSON.stringify(DEFAULT_CONFIG));
  }
  // 모든 반의 sessions를 표준값으로 자동 보정 (원장만)
  // 기준: days 배열의 패턴으로 판단 (사용자 정의 반도 포함)
  //  - [1,3,5]=월수금 12회 / [2,4,5]=화목금 12회
  //  - [1,3]=월수 8회 / [2,4]=화목 8회
  if(session?.role==='principal' && cfg.classTypes){
    const matchStandard=(days)=>{
      if(!Array.isArray(days)) return null;
      const sorted=[...days].sort((a,b)=>a-b).join(',');
      if(sorted==='1,3,5') return 12; // 월수금
      if(sorted==='2,4,5') return 12; // 화목금
      if(sorted==='1,3')   return 8;  // 월수
      if(sorted==='2,4')   return 8;  // 화목
      return null;
    };
    let changed=false;
    let fixedList=[];
    Object.entries(cfg.classTypes).forEach(([k,v])=>{
      const want=matchStandard(v.days);
      if(want && v.sessions!==want){
        fixedList.push(`${v.label||k}: ${v.sessions}→${want}`);
        cfg.classTypes[k].sessions=want;
        changed=true;
      }
    });
    if(changed){
      try{
        const {setDoc}=fb();
        const toSave=Object.fromEntries(Object.entries(cfg).filter(([k])=>!k.startsWith('_')));
        await setDoc(configDocRef(), toSave);
        clearSessionsCache();
        console.log('[자동보정] 회차값 표준화:', fixedList.join(', '));
      }catch(e){ console.warn('자동 보정 저장 실패:', e); }
    }
  }
  cfg._myRole=session?.role;
  cfg._myName=session?.displayName;
  // 특강 배열 초기화
  if(!cfg.specialClasses) cfg.specialClasses=[];

  // ── 학년 자동 증가: 년도가 바뀌면 학생 학년 올리기 (원장만) ──
  if(session?.role==='principal' && cfg.students?.length){
    const curYear = new Date().getFullYear();
    const lastYear = cfg.gradeUpYear||0;
    if(lastYear < curYear){
      const GRADE_UP = {
        '초3':'초4','초4':'초5','초5':'초6','초6':'중1',
        '중1':'중2','중2':'중3','중3':'고1',
        '고1':'고2','고2':'고3'
      };
      let upgraded = 0;
      cfg.students.forEach(s=>{
        if(s.grade && GRADE_UP[s.grade]){
          s.grade = GRADE_UP[s.grade];
          upgraded++;
        }
      });
      cfg.gradeUpYear = curYear;
      if(upgraded > 0){
        try{
          const {setDoc}=fb();
          const toSave=Object.fromEntries(Object.entries(cfg).filter(([k])=>!k.startsWith('_')));
          await setDoc(configDocRef(), toSave);
          toast(`🎓 ${curYear}년 새해! 학생 ${upgraded}명 학년이 자동으로 올라갔습니다.`);
        }catch(e){ console.warn('학년 자동 업그레이드 저장 실패:', e); }
      } else {
        try{
          const {setDoc}=fb();
          const toSave=Object.fromEntries(Object.entries(cfg).filter(([k])=>!k.startsWith('_')));
          await setDoc(configDocRef(), toSave);
        }catch(e){}
      }
    }
  }
  const keys=Object.keys(CT());
  if(!st.matrixClass&&keys.length) st.matrixClass=keys[0];
  if(!st.newCls&&keys.length) st.newCls=keys[0];
}

async function saveConfigToFb(){
  const {setDoc}=fb();
  setSyncState('syncing','저장 중...');
  try{
    // _myRole, _myName 같은 임시 필드 제거
    const toSave=Object.fromEntries(
      Object.entries(cfg).filter(([k])=>!k.startsWith('_'))
    );
    await setDoc(configDocRef(), toSave);
    setSyncState('ok','저장 완료');
  }catch(e){
    setSyncState('err','저장 실패');

// gasCall('saveConfig', {config:cfg}) 호환 래퍼
async function gasCall(action, body={}){
  setSyncState('syncing','처리 중...');
  try{
    const result = await firebaseAction(action, body);
    setSyncState('ok', new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'}));
    return result;

async function firebaseAction(action, body){
  const {getDoc,setDoc,getDocs,addDoc,deleteDoc,collection,query,where,doc}=fb();

  if(action==='saveConfig'){
    // 휴일/반설정 변경 가능성 → 회차 캐시 비우기
    clearSessionsCache();
    const toSave=Object.fromEntries(
      Object.entries(body.config||cfg).filter(([k])=>!k.startsWith('_'))
    );
    // 선생님이 config 저장 시 (보강일 참여 학생 등) 전체 config 읽어서 해당 부분만 머지
    if(session?.role==='teacher'){
      const snap=await getDoc(configDocRef());
      const full=snap.exists()?snap.data():{};
      // makeupDays만 머지 허용
      if(toSave.makeupDays) full.makeupDays=toSave.makeupDays;
      await setDoc(configDocRef(), full);
      cfg=Object.assign({},full);
    } else {
      await setDoc(configDocRef(), toSave);
      cfg=Object.assign({},toSave,{_myRole:session?.role,_myName:session?.displayName});
    }
    return {ok:true};
  }

  if(action==='getConfig'){
    await loadConfig(); return {ok:true,config:cfg};
  }

  if(action==='getMonthData'){
    await loadMonthData(); return {ok:true,mdb};
  }

  if(action==='saveLesson'){
    return await persistLessonFb(body.lesson, body.knownUpdatedAt);
  }

  if(action==='saveMakeup'){
    // makeup은 이제 lesson 시스템으로 처리되므로 skip
    return {ok:true};
  }

  if(action==='saveWeeklyEval'){
    const {year,month,key,eval:ev}=body;
    await setDoc(weeklyEvalDocRef(year,month,key), {
      ...ev, key, year:parseInt(year), month:parseInt(month),
      updatedAt:new Date().toISOString(), updatedBy:session?.username||''
    });
    if(!mdb.weeklyEval) mdb.weeklyEval={};
    mdb.weeklyEval[key]=ev;
    return {ok:true};
  }

  if(action==='saveTextbookProgress'){
    const {studentId,textbookId,currentPage,totalPage,startDate,memo}=body;
    const key=studentId+'_'+textbookId;
    const data={key,studentId,textbookId,
      currentPage:parseInt(currentPage)||0,
      totalPage:parseInt(totalPage)||0,
      startDate:startDate||'', memo:memo||'',
      updatedAt:new Date().toISOString(), updatedBy:session?.username||''};
    await setDoc(tbProgressDocRef(key), data);
    textbookProgress[key]=data;
    return {ok:true};
  }

  if(action==='getTextbookProgress'){
    await loadTextbookProgress(); return {ok:true,progress:textbookProgress};
  }

  if(action==='saveTextbookTest'){
    const {studentId,textbookId,score,date,memo,manualComplete}=body;
    // 시도 횟수 계산
    const existing=(textbookTests[studentId]||{})[textbookId]||[];
    const attempt=existing.length+1;
    const isManual=!!manualComplete;
    const passed=isManual?true:parseFloat(score)>=80;
    const parsedScore=isManual?null:parseFloat(score);
    const key=studentId+'_'+textbookId+'_'+attempt;
    const data={key,studentId,textbookId,attempt,
      score:parsedScore,passed,date:date||dk(new Date()),memo:memo||'',
      manualComplete:isManual,
      updatedAt:new Date().toISOString(),updatedBy:session?.username||''};
    await addDoc(tbTestColRef(), data);
    if(!textbookTests[studentId]) textbookTests[studentId]={};
    if(!textbookTests[studentId][textbookId]) textbookTests[studentId][textbookId]=[];
    textbookTests[studentId][textbookId].push(data);
    return {ok:true,attempt,passed,key};
  }

  if(action==='getTextbookTests'){
    await loadTextbookTests(); return {ok:true,tests:textbookTests};
  }

  if(action==='deleteTextbookTest'){
    const {key}=body;
    // key로 문서 찾아서 삭제
    const q=query(tbTestColRef(),where('key','==',key));
    const snaps=await getDocs(q);
    for(const d of snaps.docs) await deleteDoc(d.ref);
    return {ok:true};
  }

  if(action==='saveSpecialLesson'){
    const {lesson}=body;
    const key=lesson.specialId+'_'+lesson.studentId+'_'+lesson.sessionNo;
    const data={...lesson, key, updatedAt:new Date().toISOString(), updatedBy:session?.username||''};
    await setDoc(doc(fbDb(),'special_lessons',key), data);
    specialLessons[key]=data;
    return {ok:true};
  }

  if(action==='deleteSpecialLessons'){
    // 특강 삭제 시 연관된 lesson들도 삭제
    const {specialId}=body;
    const q=query(specialLessonsColRef(),where('specialId','==',specialId));
    const snaps=await getDocs(q);
    for(const d of snaps.docs){
      await deleteDoc(d.ref);
      delete specialLessons[d.id];
    }
    return {ok:true};
  }

  throw new Error('알 수 없는 action: '+action);
}

let prevMonthLessonsCache = {}; // { 'YYYY-MM': {key: lessonData} }

// ── 월 데이터 로드 ──
async function loadMonthData(){
  const {getDocs,collection,getDoc,query,where}=fb();
  const y=st.year, m=st.month;
  const colName=`lessons_${y}-${String(m).padStart(2,'0')}`;
  const col=collection(fbDb(), colName);

  const lessons={};
  lessonVersions={};
  const snaps=await getDocs(col);
  snaps.forEach(d=>{
    const data=d.data();
    lessons[data.key||d.id]=data;
    lessonVersions[data.key||d.id]=data.updatedAt||'';
  });

  // 이전 달 데이터 백그라운드 로드 (이전과제 표시용, 캐시 없을 때만)
  const pm = m===1?12:m-1;
  const py = m===1?y-1:y;
  const prevKey = `${py}-${String(pm).padStart(2,'0')}`;
  if(!prevMonthLessonsCache[prevKey]){
    try{
      const prevCol=collection(fbDb(), `lessons_${prevKey}`);
      const prevSnaps=await getDocs(prevCol);
      const prevLessons={};
      prevSnaps.forEach(d=>{ const data=d.data(); prevLessons[data.key||d.id]=data; });
      prevMonthLessonsCache[prevKey]=prevLessons;
    } catch(e){ prevMonthLessonsCache[prevKey]={}; }
  }

  // 주간 평가
  const weeklyEval={};
  const wCol=collection(fbDb(),`weekly_eval_${y}-${String(m).padStart(2,'0')}`);
  const wSnaps=await getDocs(wCol);
  wSnaps.forEach(d=>{
    const data=d.data();
    weeklyEval[data.key||d.id]=data;
  });

  mdb={year:y,month:m,lessons,makeup:{},carryIn:{},weeklyEval,lessonVersions};
}

// ── 수업 저장 (충돌 감지) ──
async function persistLessonFb(lesson, knownUpdatedAt, forceOverwrite=false){
  const {getDoc,setDoc}=fb();
  const key=lesson.studentId+'_'+lesson.date;
  // 날짜에서 실제 연/월 추출 (과거 날짜 입력 시에도 정확한 컬렉션에 저장)
  const lessonYear  = lesson.date ? parseInt(lesson.date.slice(0,4)) : st.year;
  const lessonMonth = lesson.date ? parseInt(lesson.date.slice(5,7)) : st.month;
  const ref=lessonDocRef(lessonYear,lessonMonth,key);

  // 충돌 감지
  if(!forceOverwrite&&knownUpdatedAt){
    const snap=await getDoc(ref);
    if(snap.exists()){
      const cur=snap.data();
      if(cur.updatedAt&&cur.updatedAt!==knownUpdatedAt&&cur.updatedBy!==session?.username){
        return {ok:false,conflict:true,
          conflictedBy:cur.updatedBy,conflictedAt:cur.updatedAt,currentRecord:cur};
      }
    }
  }

  const now=new Date().toISOString();
  const data={...lesson,key,year:lessonYear,month:lessonMonth,
    updatedAt:now,updatedBy:session?.username||''};
  await setDoc(ref, data);
  lessonVersions[key]=now;
  mdb.lessons[key]=data;
  return {ok:true,updatedAt:now};
}

// ── persistLesson 래퍼 ──
async function persistLesson(lesson, forceOverwrite=false){
  const key=lesson.studentId+'_'+lesson.date;
  const knownUpdatedAt=forceOverwrite?null:(lessonVersions[key]||null);
  try{
    const res=await persistLessonFb(lesson,knownUpdatedAt,forceOverwrite);
    if(res.conflict){ showConflictModal(lesson,res); return false; }
    return true;
  }catch(e){ toast('저장 실패: '+e.message,true); return false; }
}

// 7일 지난 로그 자동 삭제
async function purgeOldLogs(){
  try{
    const {getDocs, query, where, deleteDoc}=fb();
    const cutoff=new Date(Date.now() - 7*24*60*60*1000).toISOString();
    const q=query(activityLogColRef(), where('timestamp','<', cutoff));
    const snaps=await getDocs(q);
    let count=0;
    for(const d of snaps.docs){
      await deleteDoc(d.ref);
      count++;
    }
    return count;
  }catch(e){
    console.warn('로그 정리 실패:', e);
    return 0;
  }
}

// ── 보강 데이터 진단 ──
function diagnoseMakeupData(){
  const container=document.getElementById('mkDiagContainer');
  if(!container) return;
  const studs=cfg.students||[];
  const monthKey=`${st.year}-${String(st.month).padStart(2,'0')}`;
  const days=(cfg.makeupDays||{})[monthKey]||[];
  const lessons=Object.values(mdb.lessons||{});

  // 진단 항목들
  const issues={
    oldFormat:[],       // studentIds 옛 배열 사용
    noPeriod:[],        // 교시 빈 값
    noTeacher:[],       // 담당 빈 값
    noAbsent:[],        // 보강 등록은 됐는데 결석 lesson에 makeupRequest 없음
    orphanRequest:[],   // lesson엔 makeupRequest 있는데 makeupDays엔 학생 없음
    duplicate:[],       // 같은 학생이 같은 날 같은 교시에 중복
  };

  // 1) makeupDays 검사
  days.forEach(entry=>{
    const date=entry.date;
    if(Array.isArray(entry.studentIds) && entry.studentIds.length){
      issues.oldFormat.push({date, count:entry.studentIds.length, ids:entry.studentIds});
    }
    const arr=getMakeupStudents(entry);
    const slotMap=new Map(); // 같은 날 + 같은 교시 + 같은 학생 중복 검출
    arr.forEach((es,idx)=>{
      const stu=studs.find(s=>s.id===es.id);
      const studName=stu?.name||'(?)';
      // 교시 미정
      if(!es.period || (es.period!=='1' && es.period!=='2')){
        issues.noPeriod.push({date, sid:es.id, name:studName, period:es.period||'(없음)', teacher:es.teacher||''});
      }
      // 담당 미정
      if(!es.teacher){
        issues.noTeacher.push({date, sid:es.id, name:studName, period:es.period||''});
      }
      // 같은 날+교시 중복
      const slotKey=`${es.id}__${es.period||''}`;
      if(slotMap.has(slotKey)){
        issues.duplicate.push({date, sid:es.id, name:studName, period:es.period||''});
      }
      slotMap.set(slotKey, true);
      // 결석 연결 안 됨
      const hasAbsentLink=lessons.some(l=>
        l.studentId===es.id && l.makeupRequest && l.makeupRequest.date===date
      );
      if(!hasAbsentLink){
        issues.noAbsent.push({date, sid:es.id, name:studName, period:es.period||'', teacher:es.teacher||''});
      }
    });
  });

  // 2) lessons에 makeupRequest 있는데 makeupDays에 학생 없는 케이스
  lessons.forEach(l=>{
    if(!l.makeupRequest) return;
    const reqDate=l.makeupRequest.date;
    const entry=days.find(e=>e.date===reqDate);
    let foundInMakeup=false;
    if(entry){
      const arr=getMakeupStudents(entry);
      foundInMakeup=arr.some(x=>x.id===l.studentId);
    }
    if(!foundInMakeup){
      const stu=studs.find(s=>s.id===l.studentId);
      issues.orphanRequest.push({
        absentDate:l.date,
        reqDate,
        sid:l.studentId,
        name:stu?.name||'(?)',
        period:l.makeupRequest.period||'',
        teacher:l.makeupRequest.teacher||''
      });
    }
  });

  // 화면 그리기
  let h='';
  const totalIssues=
    issues.oldFormat.length +
    issues.noPeriod.length +
    issues.noTeacher.length +
    issues.noAbsent.length +
    issues.orphanRequest.length +
    issues.duplicate.length;

  if(totalIssues===0){
    h=`<div style="padding:14px;text-align:center;color:var(--green);font-weight:600">✅ 모든 보강 데이터가 정상입니다!</div>`;
    container.innerHTML=h;
    return;
  }

  h=`<div style="padding:8px 0">
    <div style="font-weight:700;margin-bottom:8px">${st.year}년 ${st.month}월 보강 데이터 진단 결과: 총 ${totalIssues}건</div>`;

  // 옛 형식
  if(issues.oldFormat.length){
    h+=`<div style="margin-bottom:14px;padding:10px;background:#fff5e0;border:1px solid #e8c870;border-radius:var(--r)">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
        <b style="font-size:13px">⚠️ 옛 형식 데이터 (${issues.oldFormat.length}건)</b>
        <button class="btn btn-sm btn-primary" onclick="fixOldFormat()">자동 변환</button>
      </div>
      <div style="font-size:11px;color:var(--text2);margin-bottom:6px">옛 데이터(studentIds 배열)를 새 형식으로 자동 변환합니다.</div>`;
    issues.oldFormat.forEach(o=>{
      h+=`<div style="font-size:12px">📅 ${o.date}: ${o.count}명</div>`;
    });
    h+=`</div>`;
  }

  // 중복
  if(issues.duplicate.length){
    h+=`<div style="margin-bottom:14px;padding:10px;background:#fce6e6;border:1px solid #e8a8a8;border-radius:var(--r)">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
        <b style="font-size:13px">🚫 중복 등록 (${issues.duplicate.length}건)</b>
      </div>
      <div style="font-size:11px;color:var(--text2);margin-bottom:6px">같은 학생이 같은 날·같은 교시에 중복 등록된 경우입니다. 시간표에서 직접 제거해주세요.</div>`;
    issues.duplicate.forEach(d=>{
      h+=`<div style="font-size:12px;padding:4px 0">📅 ${d.date}: <b>${esc(d.name)}</b> (${d.period?d.period+'교시':'교시 미정'})</div>`;
    });
    h+=`</div>`;
  }

  // 교시 미정
  if(issues.noPeriod.length){
    h+=`<div style="margin-bottom:14px;padding:10px;background:#fff5e0;border:1px solid #e8c870;border-radius:var(--r)">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
        <b style="font-size:13px">⏰ 교시 미정 (${issues.noPeriod.length}건)</b>
      </div>
      <div style="font-size:11px;color:var(--text2);margin-bottom:6px">교시가 정해지지 않은 학생입니다. 시간표 → 토요보강 시간표 → "⚠️ 교시 미정" 행에서 학생 칩 클릭하여 교시를 설정하거나 제거하세요.</div>`;
    issues.noPeriod.forEach(o=>{
      h+=`<div style="display:flex;align-items:center;gap:6px;font-size:12px;padding:4px 0">
        <span>📅 ${o.date}: <b>${esc(o.name)}</b></span>
        <span style="color:var(--text3)">담당: ${esc(o.teacher||'미지정')}</span>
        <button class="btn btn-sm" style="margin-left:auto;color:var(--red);font-size:10px;padding:3px 8px" onclick="removeStudentFromMakeup('${o.sid}','${o.date}')">제거</button>
      </div>`;
    });
    h+=`</div>`;
  }

  // 결석 연결 안 됨
  if(issues.noAbsent.length){
    h+=`<div style="margin-bottom:14px;padding:10px;background:#fff5e0;border:1px solid #e8c870;border-radius:var(--r)">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
        <b style="font-size:13px">🔗 결석 연결 안 됨 (${issues.noAbsent.length}건)</b>
      </div>
      <div style="font-size:11px;color:var(--text2);margin-bottom:6px">보강 등록은 되어있지만 어느 결석에 대한 보강인지 lesson에 기록이 없습니다. (이전에 결석 → 출석 변경했을 가능성)</div>`;
    issues.noAbsent.forEach(o=>{
      h+=`<div style="display:flex;align-items:center;gap:6px;font-size:12px;padding:4px 0">
        <span>📅 ${o.date}: <b>${esc(o.name)}</b></span>
        <span style="color:var(--text3)">${o.period?o.period+'교시':'교시미정'} · ${esc(o.teacher||'미지정')}</span>
        <button class="btn btn-sm" style="margin-left:auto;color:var(--red);font-size:10px;padding:3px 8px" onclick="removeStudentFromMakeup('${o.sid}','${o.date}')">제거</button>
      </div>`;
    });
    h+=`</div>`;
  }

  // 고아 보강 신청 (lesson에만 있음)
  if(issues.orphanRequest.length){
    h+=`<div style="margin-bottom:14px;padding:10px;background:#fce6e6;border:1px solid #e8a8a8;border-radius:var(--r)">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
        <b style="font-size:13px">👻 고아 보강 신청 (${issues.orphanRequest.length}건)</b>
        <button class="btn btn-sm btn-primary" onclick="fixOrphanRequests()">일괄 정리</button>
      </div>
      <div style="font-size:11px;color:var(--text2);margin-bottom:6px">결석 lesson에 makeupRequest 정보는 있지만, 토요보강 데이터에서는 학생이 빠진 경우입니다.</div>`;
    issues.orphanRequest.forEach(o=>{
      h+=`<div style="font-size:12px;padding:4px 0">${o.absentDate} 결석 → ${o.reqDate} 보강(없음): <b>${esc(o.name)}</b></div>`;
    });
    h+=`</div>`;
  }

  // 담당 미정만 (다른 이슈에 포함 안 된 것)
  const onlyNoTeacher=issues.noTeacher.filter(t=>{
    return !issues.noPeriod.some(p=>p.sid===t.sid && p.date===t.date) &&
           !issues.noAbsent.some(p=>p.sid===t.sid && p.date===t.date);

// 옛 형식(studentIds) → 신 형식(students) 자동 변환
async function fixOldFormat(){
  if(!confirm('옛 형식 데이터를 새 형식으로 자동 변환하시겠어요?\n(studentIds 배열을 students 배열로 변환합니다)')) return;
  const monthKey=`${st.year}-${String(st.month).padStart(2,'0')}`;
  const days=(cfg.makeupDays||{})[monthKey]||[];
  let changed=0;
  days.forEach(entry=>{
    if(Array.isArray(entry.studentIds) && entry.studentIds.length){
      const newArr=getMakeupStudents(entry); // 자동 정규화
      entry.students=newArr;
      delete entry.studentIds;
      changed++;
    }
  });
  if(changed===0){ toast('변환할 데이터가 없습니다'); return; }
  try{
    await gasCall('saveConfig',{config:cfg});
    toast(`${changed}개 보강일 데이터를 새 형식으로 변환했습니다`);
    diagnoseMakeupData();
    render();
  }catch(e){ toast('변환 실패: '+e.message,true); }
}

// 고아 보강 신청 정리 - lesson에서 makeupRequest 제거
async function fixOrphanRequests(){
  if(!confirm('lesson에 남아있는 고아 보강 신청 정보를 모두 제거하시겠어요?\n(결석 기록은 그대로 유지되고, 보강 신청 정보만 삭제됩니다)')) return;
  const monthKey=`${st.year}-${String(st.month).padStart(2,'0')}`;
  const days=(cfg.makeupDays||{})[monthKey]||[];
  const updated=[];
  Object.values(mdb.lessons||{}).forEach(l=>{
    if(!l.makeupRequest) return;
    const reqDate=l.makeupRequest.date;
    const entry=days.find(e=>e.date===reqDate);
    let foundInMakeup=false;
    if(entry){
      const arr=getMakeupStudents(entry);
      foundInMakeup=arr.some(x=>x.id===l.studentId);
    }
    if(!foundInMakeup){
      delete l.makeupRequest;
      updated.push(l);
    }
  });
  if(updated.length===0){ toast('정리할 데이터가 없습니다'); return; }
  try{
    for(const l of updated){ await persistLesson(l); }
    toast(`${updated.length}건의 고아 보강 정보를 정리했습니다`);
    diagnoseMakeupData();
    render();
  }catch(e){ toast('정리 실패: '+e.message,true); }
}

async function resolveConflict(choice){
  const ex=document.getElementById('conflictOverlay'); if(ex) ex.remove();
  if(!pendingConflict) return;
  const {myLesson, conflictInfo} = pendingConflict;
  pendingConflict = null;

  if(choice==='overwrite'){
    // 강제 덮어쓰기
    await persistLesson(myLesson, true);
    toast('내 내용으로 덮어썼습니다');
  } else {
    // 현재 저장된 내용으로 로컬 데이터 업데이트
    const cur = conflictInfo.currentRecord;
    if(cur){
      const key = myLesson.studentId+'_'+myLesson.date;
      mdb.lessons[key] = cur;

    }
    render();

  }
}

function CT(){
  const raw = cfg?.classTypes || DEFAULT_CT;
  const entries = Object.entries(raw);
  const baseOrder=['MW','MWF','TT','TTF'];
  entries.sort(([ka,va],[kb,vb])=>{
    const ba=va.baseType||va.label||ka, bb=vb.baseType||vb.label||kb;
    const oa=baseOrder.indexOf(ba), ob=baseOrder.indexOf(bb);
    return (oa<0?99:oa)-(ob<0?99:ob);
  });
  const sorted={};
  entries.forEach(([k,v])=>{ sorted[k]=v; });
  return sorted;
}

/* 반(classType)의 평일 부분 라벨 — 예: "월수금반" → "월수", "화목반" → "화목" */
function weekdayLabelOf(classType){
  const ct=CT()[classType]; if(!ct||!ct.days) return '';
  const wd=ct.days.filter(d=>d>=1&&d<=4); // 월~목만
  if(!wd.length) return '';
  const map={1:'월',2:'화',3:'수',4:'목'};
  return wd.sort((a,b)=>a-b).map(d=>map[d]).join('');
}

/* 학생의 평일/금요일 정보를 묶음 칩 HTML로 반환
 예: [월수 3교시 원장] [금 4교시 김시현]
 옵션: showAll=true이면 정보가 비어있어도 빈 칸으로 표시 */
function studentScheduleChips(s){
  const ct=CT()[s.classType]; if(!ct) return '';
  const hasWeekday = ct.days && ct.days.some(d=>d>=1&&d<=4);
  const hasFriday  = ct.days && ct.days.includes(5);
  const wdLabel = weekdayLabelOf(s.classType);
  const wT = s.weekdayTime, fT = s.fridayTime;
  const tWeek = s.teacher || '';
  const tFri = s.fridayTeacher || tWeek;
  let html = '';
  if(hasWeekday && (wT || tWeek || wdLabel)){
    const parts=[];
    if(wdLabel) parts.push(wdLabel);
    if(wT) parts.push(`${wT}교시`);
    if(tWeek) parts.push(esc(tWeek));
    html += `<span style="font-size:10px;font-weight:600;color:#1558a8;background:#e5effc;border-radius:8px;padding:2px 7px;border:1px solid #b9d2f0;white-space:nowrap">${parts.join(' ')}</span>`;
  }
  if(hasFriday && (fT || tFri)){
    const parts=['금'];
    if(fT) parts.push(`${fT}교시`);
    if(tFri) parts.push(esc(tFri));
    html += `<span style="font-size:10px;font-weight:600;color:#7a4e00;background:#fdf0d8;border-radius:8px;padding:2px 7px;border:1px solid #e0c060;white-space:nowrap">${parts.join(' ')}</span>`;
  }
  return html;
}

/* ── 담당 선생님 목록 / 학생 필터 ──
 설정에서 등록한 선생님 명단(cfg.teachers)만 반환.
 명단이 비어있으면 학생 데이터에서 실제로 쓰이는 담당자들을 fallback으로 반환 */
function allTeachers(){
  const assistants=(cfg?.assistantTeachers||[]);
  const list=(cfg?.teachers||[]).filter(t=>Boolean(t)&&!assistants.includes(t));
  if(list.length) return [...list].sort();
  // fallback: 명단이 비어있을 때만 학생 데이터에서 자동 수집
  const set=new Set();
  (cfg?.students||[]).forEach(s=>{
    if(s.teacher) set.add(s.teacher);
    if(s.fridayTeacher) set.add(s.fridayTeacher);
  });
  return [...set].sort();
}

/* 특정 선생님이 담당하는 학생인지 — 평일/금요일 어느 한쪽이라도 담당이면 true */
function isStudentOfTeacher(s, teacherUsername){
  if(!teacherUsername) return true;
  // 보조 선생님인 경우 assistantStudents 목록 기준
  const assistants=(cfg?.assistantTeachers||[]);
  if(assistants.includes(teacherUsername)){
    const assistantStudents=(cfg?.assistantStudents||{})[teacherUsername]||[];
    return assistantStudents.includes(s.id);
  }
  return s.teacher===teacherUsername || s.fridayTeacher===teacherUsername;
}

/* ── 월 사이클 회차 시스템 ──
 규칙:
 - 모든 수업일을 기준일(2026-01-01)부터 한 줄로 나열
 - 12개(또는 8개)씩 끊어 사이클을 만듦
 - 각 사이클은 "1회차가 시작되는 달"에 귀속됨
 - "N월 화면" = N월에 1회차가 시작되는 사이클의 회차들 (12회 전체, 다음달까지 걸칠 수 있음)

 예시 (화목금반 12회):
 - 4월 사이클 1회차 = 4/2 → 12회차 = 4/28 (4월 안에 끝)
 - 5월 사이클 1회차 = 4/30 (4월에 다 못 쓴 수업일!) → ... → 12회차 = 6/2
 - 6월 사이클 1회차 = 6/4 → ...
*/

const _cycleCache=new Map(); // key=classType, value=[{month, dates[]}]
const _allDatesCache=new Map(); // key=classType, value=[date, date...]

/* 모든 수업일 (휴일 제외)을 기준일부터 미래까지 나열 */
function _getAllSessionDates(classType){
  if(_allDatesCache.has(classType)) return _allDatesCache.get(classType);
  const ct=CT()[classType]; if(!ct) return [];
  const {days}=ct;
  const start=new Date(2026,0,1);
  const end=new Date(2027,11,31); // 2년치
  const result=[];
  const cur=new Date(start);
  while(cur<=end){
    const dStr=dk(cur);
    if(days.includes(cur.getDay()) && !isHol(dStr)){
      result.push(dStr);
    }
    cur.setDate(cur.getDate()+1);
  }
  _allDatesCache.set(classType,result);
  return result;
}

/* 모든 사이클 정보 — 각 사이클: {ownerMonth: 'YYYY-MM', dates: [...]}
 ownerMonth = 그 사이클의 회차가 가장 많이 속한 달 (동률이면 더 늦은 달) */
function _getAllCycles(classType){
  if(_cycleCache.has(classType)) return _cycleCache.get(classType);
  const ct=CT()[classType]; if(!ct) return [];
  const {sessions}=ct;
  const all=_getAllSessionDates(classType);
  const cycles=[];
  for(let i=0; i<all.length; i+=sessions){
    const slice=all.slice(i, i+sessions);
    if(!slice.length) break;
    // 회차들이 속한 달의 카운트
    const counts={};
    slice.forEach(d=>{
      const m=d.substring(0,7);
      counts[m]=(counts[m]||0)+1;
    });
    // 가장 많은 회차가 속한 달 (동률시 늦은 달 우선 = 사이클이 새 달로 넘어가는 자연스러운 흐름)
    let ownerMonth='', maxCount=0;
    Object.entries(counts).forEach(([m,c])=>{
      if(c>maxCount || (c===maxCount && m>ownerMonth)){
        maxCount=c; ownerMonth=m;
      }
    });
    cycles.push({ownerMonth, dates:slice});
  }
  _cycleCache.set(classType,cycles);
  return cycles;
}

/* 특정 (year, month)에 귀속된 사이클의 회차 목록 */
function buildMonthSessions(classType, year, month){
  const targetMonth=`${year}-${String(month).padStart(2,'0')}`;
  const cycles=_getAllCycles(classType);
  const found=cycles.find(c=>c.ownerMonth===targetMonth);
  return found?found.dates:[];
}

/* 캐시 무효화 — cfg나 휴일이 바뀌면 호출 */
function clearSessionsCache(){ _cycleCache.clear(); _allDatesCache.clear(); }

/* 기존 호환: 월별 날짜 배열 반환 */
function sessionDatesForMonth(classType,year,month){
  return buildMonthSessions(classType, year, month);
}

/* 월별 회차 정보 (sessionNo 포함) */
function sessionsForMonthWithCycle(classType, year, month){
  const dates=buildMonthSessions(classType, year, month);
  return dates.map((d,i)=>({sessionNo:i+1, dateStr:d}));
}

function prevHwInMonth(sid,dateStr,classType,year,month){
  // 현재 회차에 이미 점수가 입력됐으면 표시 안 함 (이미 채점했으니)
  const curL=mdb.lessons[lk(sid,dateStr)];
  if(curL && curL.homeworkScore && String(curL.homeworkScore).trim()!=='') return '';

  // 규칙: "지난 과제"는 딱 한 번만 표시.
  //  - 학생의 모든 수업(정규 + 토요보강)을 시간 역순으로 검사
  //  - homework가 있는 가장 최근 수업 → 그 과제 반환
  //  - homework는 없지만 결석이 아닌 수업을 먼저 만나면 → 차단 (이미 처리됨)
  //  - 결석이면 건너뜀
  //  - homeworkScore가 채워진 수업을 먼저 만나면 → 차단 (이전 과제는 채점됨)
  // mdb.lessons(현재 선택 달) + 이전 달 캐시 + 오늘 날짜 달 캐시를 모두 합쳐 검색
  // dateStr에서 연월 추출
  const dateY = parseInt(dateStr.slice(0,4));
  const dateM = parseInt(dateStr.slice(5,7));
  const pm = dateM===1?12:dateM-1;
  const py = dateM===1?dateY-1:dateY;
  const prevKey = `${py}-${String(pm).padStart(2,'0')}`;
  const curKey  = `${dateY}-${String(dateM).padStart(2,'0')}`;
  // prevMonthLessonsCache에는 이전 달뿐 아니라 ensureMonthLoaded로 로드된 달도 있을 수 있음
  const prevLessons  = prevMonthLessonsCache[prevKey]||{};
  const curCacheLessons = prevMonthLessonsCache[curKey]||{};
  // mdb.lessons를 기준으로, 캐시 데이터로 보완 (mdb.lessons 우선)
  const merged = {...prevLessons, ...curCacheLessons, ...(mdb.lessons||{})};
  const allLessons=Object.values(merged)
    .filter(l=>l.studentId===sid && l.date && l.date<dateStr)
    .sort((a,b)=>b.date.localeCompare(a.date)); // 시간 역순

  for(const l of allLessons){
    const hasHw = l.homework && String(l.homework).trim()!=='';
    const hasScore = l.homeworkScore && String(l.homeworkScore).trim()!=='';
    const att = l.attendance;
    const isAbsent = (att==='absent');

    // 점수가 입력됐으면 → 그 시점에 과제가 처리된 거니, 그 이전은 안 본다 (차단)
    // 단, 그 수업 자체가 새 과제(hasHw)를 갖고 있다면 그건 다음 수업의 "지난 과제"
    if(hasScore){
      if(hasHw) return l.homework;
      return ''; // 점수만 있고 새 과제 없음 → 처리 완료, 차단
    }

    // homework가 있는 수업을 만나면 → 그게 표시될 과제
    if(hasHw) return l.homework;

    // 결석이면 건너뜀 (다음 수업으로 이월)
    if(isAbsent) continue;

    // 결석도 아니고 homework도 score도 없음 → 차단 (그 수업에서 처리됐다고 봄)
    return '';
  }

  if(mdb.carryIn&&mdb.carryIn[sid])return mdb.carryIn[sid];
  return '';
}

/* ── 학생별 담당 선생님 헬퍼 ──
   student 객체에 직접 저장:
     s.teacher        : 평일(월~목) 담당 선생님 아이디
     s.fridayTeacher  : 금요일 담당 선생님 아이디 (없으면 teacher 사용)
*/
function getStudentTeacher(s, dow){
  if(dow===5 && s.fridayTeacher) return s.fridayTeacher;
  return s.teacher || null;
}
// 오늘 이 학생이 로그인한 선생님 담당인지
function isMyStudentToday(s, dow){
  if(session?.role==='principal') return true;
  if(st.viewAll) return true; // 선생님이 전체 보기 모드를 켰을 때
  // 보조 선생님: 본인이 담당으로 지정된 학생만 접근
  if(session?.role==='assistant'){
    const assistantStudents=(cfg.assistantStudents||{})[session.username]||[];
    return assistantStudents.includes(s.id);
  }
  const assigned = getStudentTeacher(s, dow);
  if(!assigned) return true; // 미지정이면 모두 접근
  return assigned === session?.username;
}
// 수업기록표에서 날짜별 담당 이름 (학생별로 다를 수 있으므로 행에서 표시)
function teacherLabelForStudent(s, dateStr){
  const dow = parseDate(dateStr).getDay();
  return getStudentTeacher(s, dow);
}

/* ── TEXTBOOK TAB (통합, 소요기간 기반) ── */
function tbKey(sid,tbId){ return sid+'_'+tbId; }
function daysSince(dateStr){
  if(!dateStr) return null;
  const start=new Date(dateStr); start.setHours(0,0,0,0);
  const today=new Date(); today.setHours(0,0,0,0);
  return Math.floor((today-start)/(1000*60*60*24));
}
function durationLabel(dateStr){
  const d=daysSince(dateStr);
  if(d===null) return '';
  if(d===0) return '오늘 시작';
  if(d<7)   return 'D+'+d+'일';
  const w=Math.floor(d/7), r=d%7;
  return w+'주'+(r?r+'일':'')+ ' (D+'+d+')';
}
function durationBetweenLabel(startDateStr, endDateStr){
  if(!startDateStr || !endDateStr) return '';
  const s=new Date(startDateStr); s.setHours(0,0,0,0);
  const e=new Date(endDateStr);   e.setHours(0,0,0,0);
  const days=Math.round((e-s)/(1000*60*60*24));
  if(days<0) return '';
  if(days===0) return '당일 완료';
  if(days<7)  return days+'일 소요';
  const w=Math.floor(days/7), r=days%7;
  return w+'주'+(r?r+'일':'')+ ' 소요 ('+days+'일)';
}

      <td style="padding:3px;border-bottom:1px solid var(--border);min-width:55px">
        <input class="sinp" type="text" value="${esc(l.homeworkScore||'')}" placeholder="-" onblur="spSave('${sp.id}','${s.id}',${sn},'homeworkScore',this.value)">
      </td>
      <td style="padding:3px;border-bottom:1px solid var(--border);min-width:55px">
        <input class="sinp" type="text" value="${esc(l.testScore||'')}" placeholder="-" onblur="spSave('${sp.id}','${s.id}',${sn},'testScore',this.value)">
      </td>
      <td style="padding:3px;border-bottom:1px solid var(--border);border-right:2px solid var(--border);min-width:140px">
        <textarea class="tinp" placeholder="진도/특이사항" onblur="spSave('${sp.id}','${s.id}',${sn},'progress',this.value)" style="width:100%;min-height:30px">${esc(l.progress||'')}</textarea>
      </td>`;
    }
    h+=`</tr>`;
  });
  h+=`</tbody></table></div>`;
  return h;
}

// 특강 lesson 저장
async function spSave(spId, sid, sn, field, val){
  const key=spLessonKey(spId, sid, sn);
  const existing=specialLessons[key]||{specialId:spId, studentId:sid, sessionNo:sn};
  const oldV=existing[field];
  existing[field]=val;
  specialLessons[key]=existing;
  try{
    await gasCall('saveSpecialLesson', {lesson: existing});
    // 활동 로그 (선생님일 때만)
    const sp=(cfg.specialClasses||[]).find(x=>x.id===spId);
    const stud=(cfg.students||[]).find(x=>x.id===sid);
    if(session?.role!=='principal'){
      logActivity('special_edit', sid, existing.date||'', `[${sp?.name||'특강'}] ${sn}회차 ${field}`, oldV, val);
    }
  }catch(e){ toast('저장 실패: '+e.message,true); }
}

async function spAttend(spId, sid, sn, v){
  const key=spLessonKey(spId, sid, sn);
  const existing=specialLessons[key]||{specialId:spId, studentId:sid, sessionNo:sn};
  const oldV=existing.attendance||'';
  existing.attendance=(existing.attendance===v?'':v);
  specialLessons[key]=existing;
  render();
  try{
    await gasCall('saveSpecialLesson', {lesson: existing});
    const sp=(cfg.specialClasses||[]).find(x=>x.id===spId);
    if(session?.role!=='principal'){
      logActivity('special_attendance', sid, existing.date||'', `[${sp?.name||'특강'}] ${sn}회차 출결`, oldV, existing.attendance);
    }
  }catch(e){ toast('저장 실패: '+e.message,true); }
}

async function delSpecial(spId){
  const sp=(cfg.specialClasses||[]).find(x=>x.id===spId);
  if(!sp) return;
  if(!confirm(`'${sp.name}' 특강을 삭제합니다. 모든 회차 기록이 사라져요. 계속하시겠어요?`)) return;
  cfg.specialClasses=(cfg.specialClasses||[]).filter(x=>x.id!==spId);
  try{
    await gasCall('saveConfig', {config: cfg});
    await gasCall('deleteSpecialLessons', {specialId: spId});
    toast('특강 삭제 완료');
    render();
  }catch(e){ toast('삭제 실패: '+e.message,true); }
}

// 특강 엑셀 다운로드 — 학생별 모든 회차의 출결/점수/진도/과제/특이사항을 한 표로
function exportSpecialExcel(spId){
  const sp=(cfg.specialClasses||[]).find(x=>x.id===spId);
  if(!sp){ toast('특강을 찾을 수 없습니다',true); return; }
  const studs=(cfg.students||[]).filter(s=>(sp.students||[]).includes(s.id));
  if(!studs.length){ toast('신청 학생이 없습니다',true); return; }

  const attMap={attend:'출석', late:'지각', absent:'결석', '':'-'};
  const totalSessions=sp.totalSessions||0;

  // 1) 시트1: 회차별 매트릭스 (가로=회차×5컬럼, 세로=학생)
  const headRow1=['학생','학년','반'];
  const headRow2=['','',''];
  for(let sn=1; sn<=totalSessions; sn++){
    headRow1.push(`${sn}회차`,'','','','');
    headRow2.push('날짜','출결','과제','시험','진도/특이');
  }
  const rows=[headRow1, headRow2];
  studs.forEach(s=>{
    const ct=CT()[s.classType];
    const row=[s.name, s.grade||'', ct?.label||s.classType];
    for(let sn=1; sn<=totalSessions; sn++){
      const l=specialLessons[spLessonKey(spId,s.id,sn)] || {};
      row.push(
        l.date||'',
        attMap[l.attendance||''] || '-',
        l.homeworkScore||'',
        l.testScore||'',
        l.progress||''
      );
    }
    rows.push(row);
  });

  const wb=XLSX.utils.book_new();
  const ws=XLSX.utils.aoa_to_sheet(rows);
  // 셀 너비 조정
  const cols=[{wch:10},{wch:8},{wch:12}];
  for(let sn=1; sn<=totalSessions; sn++){
    cols.push({wch:12},{wch:8},{wch:8},{wch:8},{wch:24});
  }
  ws['!cols']=cols;
  // 1행 회차명 셀 병합 (각 회차 5칸씩)
  const merges=[];
  for(let sn=0; sn<totalSessions; sn++){
    const startCol=3 + sn*5;
    merges.push({s:{r:0,c:startCol}, e:{r:0,c:startCol+4}});
  }
  ws['!merges']=merges;
  XLSX.utils.book_append_sheet(wb, ws, '회차 매트릭스');

  // 2) 시트2: 학생별 통계 요약
  const sumRows=[['학생','학년','반','출석','지각','결석','과제평균','시험평균','진행률(%)']];
  studs.forEach(s=>{
    const ct=CT()[s.classType];
    let attend=0,absent=0,late=0,hwScores=[],testScores=[],filled=0;
    for(let sn=1; sn<=totalSessions; sn++){
      const l=specialLessons[spLessonKey(spId,s.id,sn)];
      if(!l) continue;
      if(l.attendance==='attend') attend++;
      else if(l.attendance==='absent') absent++;
      else if(l.attendance==='late') late++;
      const hs=parseFloat(l.homeworkScore); if(!isNaN(hs)) hwScores.push(hs);
      const ts=parseFloat(l.testScore); if(!isNaN(ts)) testScores.push(ts);
      if(l.attendance||l.homeworkScore||l.testScore||l.progress) filled++;
    }
    const hwAvg=hwScores.length?Math.round(hwScores.reduce((a,b)=>a+b,0)/hwScores.length):'';
    const testAvg=testScores.length?Math.round(testScores.reduce((a,b)=>a+b,0)/testScores.length):'';
    const prog=totalSessions>0?Math.round(filled/totalSessions*100):0;
    sumRows.push([s.name, s.grade||'', ct?.label||s.classType, attend, late, absent, hwAvg, testAvg, prog]);
  });
  const ws2=XLSX.utils.aoa_to_sheet(sumRows);
  ws2['!cols']=[{wch:10},{wch:8},{wch:12},{wch:8},{wch:8},{wch:8},{wch:10},{wch:10},{wch:10}];
  XLSX.utils.book_append_sheet(wb, ws2, '학생별 요약');

  // 3) 특강 정보 시트
  const infoRows=[
    ['특강 정보',''],
    ['이름', sp.name],
    ['총 회차', sp.totalSessions||0],
    ['시작일', sp.startDate||''],
    ['담당 선생님', sp.teacher||''],
    ['신청 학생 수', studs.length],
    ['생성 일시', new Date().toLocaleString('ko-KR')],
  ];
  const ws3=XLSX.utils.aoa_to_sheet(infoRows);
  ws3['!cols']=[{wch:14},{wch:30}];
  XLSX.utils.book_append_sheet(wb, ws3, '특강 정보');

  const safeName=sp.name.replace(/[\\/:*?"<>|]/g,'_');
  XLSX.writeFile(wb, `특강_${safeName}_${dk(new Date())}.xlsx`);
  toast('특강 엑셀 다운로드 완료');
}

/* 교재가 통과됐는지 판별하는 헬퍼 */
function isTbPassed(sid, tbId){
  return (textbookTests[sid]||{})[tbId]?.some(a=>a.passed)||false;
}

function rTextbook(){
  const isPrin=session?.role==='principal';
  const allStuds=cfg.students||[];
  const studs=(!isPrin && !st.viewAll)
    ? allStuds.filter(s=>isStudentOfTeacher(s, session?.username))
    : allStuds;
  const filterSt=st.tbFilterSt||'all';

  let h=`<div class="toolbar">
    <div class="tleft">
      <select onchange="st.tbFilterSt=this.value;render()">
        <option value="all">전체 학생</option>
        ${studs.map(s=>`<option value="${s.id}" ${filterSt===s.id?'selected':''}>${s.name}</option>`).join('')}
      </select>
    </div>
  </div>`;

  const filtered=studs.filter(s=>filterSt==='all'||s.id===filterSt);
  if(!filtered.length){ h+=`<div class="empty">학생이 없습니다.</div>`; return h; }

  // 반별 그룹화 (진행 중 교재가 있는 학생만 표시)
  const byClass=new Map();
  filtered.forEach(s=>{
    // 통과되지 않은 교재가 하나라도 있어야 표시
    const activeTbs=(s.textbooks||[]).filter(t=>{
      const tbId=t.tbId||('p_'+s.id+'_'+encodeURIComponent(t.name||''));
      return !isTbPassed(s.id, tbId);
    });
    if(filterSt!=='all'||activeTbs.length){
      const k=s.classType;
      if(!byClass.has(k)) byClass.set(k,[]);
      byClass.get(k).push({s, activeTbs});
    }
  });

  if(!byClass.size){
    h+=`<div class="empty">진행 중인 교재가 없습니다.<br><small style="color:var(--text3)">모든 교재가 완료됐거나 배정된 교재가 없습니다.</small></div>`;
    return h;
  }

  byClass.forEach((items,type)=>{
    const ct=CT()[type];
    h+=`<div style="margin-bottom:14px">
      <div style="padding:6px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--rl) var(--rl) 0 0;display:flex;align-items:center;gap:6px">
        <span class="badge ${ct?.badge||'b-mwf'}" style="font-size:11px">${esc(ct?.label||type)}</span>
        <span style="font-size:11px;color:var(--text2)">${items.length}명</span>
      </div>
      <div style="border:1px solid var(--border);border-top:none;border-radius:0 0 var(--rl) var(--rl);background:var(--bg);display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr))">`;
    items.forEach(({s, activeTbs})=>{ h+=renderTextbookStudentCard(s, activeTbs); });
    h+=`</div></div>`;
  });

  // ── 완료된 교재 섹션 ──
  const completeRows=[];
  filtered.forEach(s=>{
    const myTests=textbookTests[s.id]||{};
    (s.textbooks||[]).forEach(t=>{
      const tbId=t.tbId||('p_'+s.id+'_'+encodeURIComponent(t.name||''));
      if(!isTbPassed(s.id, tbId)) return;
      const tbName=t.name||(cfg.textbooks||[]).find(b=>b.id===t.tbId)?.name||'교재';
      const attempts=(myTests[tbId]||[]);
      const passAttempt=attempts.find(a=>a.passed);
      const prog=textbookProgress[tbKey(s.id,tbId)]||{};
      completeRows.push({s, tbId, tbName, passAttempt, attempts, prog});
    });
  });

  if(completeRows.length){
    // 반별 그룹화
    const byClassC=new Map();
    completeRows.forEach(r=>{
      const k=r.s.classType;
      if(!byClassC.has(k)) byClassC.set(k,[]);
      byClassC.get(k).push(r);
    });

    h+=`<div style="margin-top:20px">
      <div style="font-size:13px;font-weight:700;color:var(--green);margin-bottom:10px;display:flex;align-items:center;gap:6px">
        ✅ 완료된 교재
        <span style="font-size:11px;font-weight:400;color:var(--text3)">${completeRows.length}건 통과</span>
      </div>`;
    byClassC.forEach((items,type)=>{
      const ct=CT()[type];
      h+=`<div style="margin-bottom:16px">
        <div style="padding:6px 12px;background:var(--green-bg);border:1px solid #80c090;border-radius:var(--rl) var(--rl) 0 0;display:flex;align-items:center;gap:6px">
          <span class="badge ${ct?.badge||'b-mwf'}" style="font-size:11px">${esc(ct?.label||type)}</span>
          <span style="font-size:11px;color:var(--green)">${items.length}건 완료</span>
        </div>
        <div style="border:1px solid #80c090;border-top:none;border-radius:0 0 var(--rl) var(--rl);background:var(--bg)">`;
      items.forEach(({s, tbId, tbName, passAttempt, attempts, prog})=>{
        const startDate=prog.startDate||'';
        const passDate=passAttempt?.date||'';
        const dateRange=startDate&&passDate?`${startDate} → ${passDate}`:(startDate?`${startDate} 시작`:(passDate?`${passDate} 완료`:''));
        const elapsed=durationBetweenLabel(startDate, passDate);
        h+=`<div style="display:flex;align-items:center;gap:10px;padding:9px 14px;border-bottom:1px solid var(--border);flex-wrap:wrap">`;
        h+=`<div style="display:flex;align-items:center;gap:5px;min-width:80px;flex-shrink:0">`;
        h+=`<span style="font-weight:700;font-size:13px;cursor:pointer" onclick="openM('studentProfile','${s.id}')">${esc(s.name)}</span>`;
        if(s.grade) h+=gradeBadge(s.grade);
        if(s.level) h+=levelBadge(s.level);
        h+=`</div>`;
        h+=`<div style="flex:1;min-width:100px">`;
        h+=`<div style="font-size:12px;font-weight:600">📖 ${esc(tbName)}</div>`;
        if(dateRange) h+=`<div style="font-size:10px;color:var(--text3);margin-top:1px">${esc(dateRange)}</div>`;
        if(elapsed) h+=`<div style="font-size:10px;font-weight:600;color:var(--green);margin-top:1px">⏱ ${esc(elapsed)}</div>`;
        h+=`</div>`;
        h+=`<div style="display:flex;align-items:center;gap:6px;flex-shrink:0">`;
        h+=passAttempt?.manualComplete
          ? `<span style="font-size:13px;font-weight:700;color:var(--green)">✅ 완료 처리</span>`
          : `<span style="font-size:13px;font-weight:700;color:var(--green)">✅ ${passAttempt?.score}점</span>`;
        h+=`<span style="font-size:10px;color:var(--text3)">${attempts.length}차 시도</span>`;
        h+=`</div>`;
        h+=`</div>`;
      });
      h+=`</div></div>`;
    });
    h+=`</div>`;
  }

  return h;
}

function renderTextbookStudentCard(s, activeTbs){
  // activeTbs: 전달되면 그것만 표시, 없으면 통과 안 된 것만 필터
  const allTbs=s.textbooks||[];
  const myTests=textbookTests[s.id]||{};
  const sTbs=activeTbs||allTbs.filter(t=>{
    const tbId=t.tbId||('p_'+s.id+'_'+encodeURIComponent(t.name||''));
    return !isTbPassed(s.id, tbId);
  });
  const ct=CT()[s.classType];
  const hasFriday=ct&&ct.days&&ct.days.includes(5);
  const wdInfo=[s.weekdayTime?`${s.weekdayTime}교시`:'', s.teacher?s.teacher:''].filter(Boolean).join(' · ');
  const friInfo=hasFriday?[s.fridayTime?`금 ${s.fridayTime}교시`:'', s.fridayTeacher?s.fridayTeacher:s.teacher?s.teacher:''].filter(Boolean).join(' · '):'';

  let h=`<div style="padding:10px 12px;border-right:1px solid var(--border);border-bottom:1px solid var(--border)">`;
  h+=`<div style="display:flex;align-items:center;gap:5px;margin-bottom:5px;flex-wrap:wrap">`;
  h+=`<span style="font-weight:700;font-size:13px;cursor:pointer" onclick="openM('studentProfile','${s.id}')">${esc(s.name)}</span>`;
  if(s.grade) h+=gradeBadge(s.grade);
  if(s.level) h+=levelBadge(s.level);
  h+=`<div style="display:flex;gap:3px;margin-left:auto">`;
  h+=`<button class="btn btn-sm" style="padding:2px 7px;font-size:10px" onclick="openM('assignTextbook','${s.id}')">+배정</button>`;
  if(allTbs.length) h+=`<button class="btn btn-sm" style="padding:2px 7px;font-size:10px" onclick="openM('addTest','${s.id}')">✱시험</button>`;
  h+=`</div></div>`;
  if(wdInfo||friInfo){
    h+=`<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:5px">`;
    if(wdInfo) h+=`<span style="font-size:10px;color:#1558a8;background:#e5effc;border-radius:6px;padding:1px 6px">${esc(wdInfo)}</span>`;
    if(friInfo) h+=`<span style="font-size:10px;color:#7a4e00;background:#fdf0d8;border-radius:6px;padding:1px 6px">금 ${esc(friInfo)}</span>`;
    h+=`</div>`;
  }
  if(s.specialNote){
    h+=`<div style="font-size:10px;color:#5a2080;background:#f3e8fc;border-radius:4px;padding:2px 6px;margin-bottom:5px">📌 ${esc(s.specialNote)}</div>`;
  }
  if(!sTbs.length){
    h+=`<div style="font-size:11px;color:var(--text3)">진행 중인 교재 없음</div>`;
  } else {
    sTbs.forEach(t=>{
      const tbId=t.tbId||('p_'+s.id+'_'+encodeURIComponent(t.name||''));
      const tbName=t.name||(cfg.textbooks||[]).find(b=>b.id===t.tbId)?.name||'교재';
      const attempts=myTests[tbId]||[];
      const passed=attempts.some(a=>a.passed);
      const lastScore=attempts.length?attempts[attempts.length-1].score:null;
      const dot=passed?'✅':attempts.length?'❌':'○';
      const dotTitle=passed?'통과':attempts.length?`${lastScore}점 재시험`:'미응시';
      const origIdx=allTbs.findIndex(x=>(x.tbId||('p_'+s.id+'_'+encodeURIComponent(x.name||'')))===tbId);
      h+=`<div style="display:flex;align-items:center;gap:5px;padding:3px 0;border-bottom:1px solid var(--border)">`;
      h+=`<span style="font-size:10px;flex-shrink:0" title="${dotTitle}">${dot}</span>`;
      h+=`<span style="font-size:11px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer" onclick="openM('editProgress','${s.id}','${tbId}')" title="${esc(tbName)}">${esc(tbName)}</span>`;
      h+=`<button style="border:none;background:none;color:var(--text3);cursor:pointer;font-size:11px;padding:0 2px;flex-shrink:0" onclick="removeStuTextbook('${s.id}',${origIdx>=0?origIdx:0})" title="삭제">×</button>`;
      h+=`</div>`;
    });
  }
  h+=`</div>`;
  return h;
}

/* ── 교재 완료 탭 ── */

  // 완료된 교재가 있는 학생만 추출

      const tbName=t.name||(cfg.textbooks||[]).find(b=>b.id===t.tbId)?.name||'교재';
      const attempts=(myTests[tbId]||[]);
      const passAttempt=attempts.find(a=>a.passed);
      const prog=textbookProgress[tbKey(s.id,tbId)]||{};
      rows.push({s, tbId, tbName, passAttempt, attempts, prog});
    });
  });

  if(!rows.length){
    return h+`<div class="empty">완료된 교재가 없습니다.<br><small style="color:var(--text3)">전범위 시험 80점 이상 통과 시 여기에 표시됩니다.</small></div>`;
  }

  // 반별 그룹화
  const byClass=new Map();
  rows.forEach(r=>{
    const k=r.s.classType;

    byClass.get(k).push(r);
  });

  byClass.forEach((items,type)=>{
    const ct=CT()[type];
    h+=`<div style="margin-bottom:16px">
      <div style="padding:6px 12px;background:var(--green-bg);border:1px solid #80c090;border-radius:var(--rl) var(--rl) 0 0;display:flex;align-items:center;gap:6px">
        <span class="badge ${ct?.badge||'b-mwf'}" style="font-size:11px">${esc(ct?.label||type)}</span>
        <span style="font-size:11px;color:var(--green)">${items.length}건 완료</span>
      </div>
      <div style="border:1px solid #80c090;border-top:none;border-radius:0 0 var(--rl) var(--rl);background:var(--bg)">`;
    items.forEach(({s, tbId, tbName, passAttempt, attempts, prog})=>{
      const startDate=prog.startDate||'';
      const passDate=passAttempt?.date||'';
      const dateRange=startDate&&passDate?`${startDate} → ${passDate}`:(startDate?`${startDate} 시작`:(passDate?`${passDate} 완료`:''));
      const elapsed=durationBetweenLabel(startDate, passDate);
      h+=`<div style="display:flex;align-items:center;gap:10px;padding:9px 14px;border-bottom:1px solid var(--border);flex-wrap:wrap">`;
      // 학생
      h+=`<div style="display:flex;align-items:center;gap:5px;min-width:80px;flex-shrink:0">`;
      h+=`<span style="font-weight:700;font-size:13px;cursor:pointer" onclick="openM('studentProfile','${s.id}')">${esc(s.name)}</span>`;
      if(s.grade) h+=gradeBadge(s.grade);
      if(s.level) h+=levelBadge(s.level);
      h+=`</div>`;
      // 교재명
      h+=`<div style="flex:1;min-width:100px">`;
      h+=`<div style="font-size:12px;font-weight:600">📖 ${esc(tbName)}</div>`;
      if(dateRange) h+=`<div style="font-size:10px;color:var(--text3);margin-top:1px">${esc(dateRange)}</div>`;
      if(elapsed) h+=`<div style="font-size:10px;font-weight:600;color:var(--green);margin-top:1px">⏱ ${esc(elapsed)}</div>`;
      h+=`</div>`;
      // 통과 정보
      h+=`<div style="display:flex;align-items:center;gap:6px;flex-shrink:0">`;
      h+=passAttempt?.manualComplete
        ? `<span style="font-size:13px;font-weight:700;color:var(--green)">✅ 완료 처리</span>`
        : `<span style="font-size:13px;font-weight:700;color:var(--green)">✅ ${passAttempt?.score}점</span>`;
      h+=`<span style="font-size:10px;color:var(--text3)">${attempts.length}차 시도</span>`;
      h+=`</div>`;
      h+=`</div>`;
    });
    h+=`</div></div>`;
  });
  return h;
}

  if(stats.absent>=2)  flags.push({type:'red',   icon:'🚫', text:`결석 ${stats.absent}회`});
  if(stats.late>=3)    flags.push({type:'amber',  icon:'⚠️', text:`지각 ${stats.late}회`});
  if(stats.hwAvg!==null&&stats.hwAvg<=60) flags.push({type:'amber', icon:'📝', text:`과제평균 ${stats.hwAvg}점`});
  if(ev){
    if(ev.app>0 && ev.app<=2) flags.push({type:'amber', icon:'🧠', text:`응용력 ${'★'.repeat(ev.app)}${'☆'.repeat(5-ev.app)}`});
    if(ev.focus>0 && ev.focus<=2) flags.push({type:'amber', icon:'👁', text:`집중도 ${'★'.repeat(ev.focus)}${'☆'.repeat(5-ev.focus)}`});
    if(ev.hw>0 && ev.hw<=2) flags.push({type:'amber', icon:'📋', text:`과제충실도 ${'★'.repeat(ev.hw)}${'☆'.repeat(5-ev.hw)}`});
  }
  return flags;
}
